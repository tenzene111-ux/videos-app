<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zhingkham</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇧🇹</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#FF2D55;--secondary:#5856D6;--accent:#FF9500;
      --dark:#000;--dark2:#0A0A0A;--dark3:#1C1C1E;--dark4:#2C2C2E;--dark5:#3A3A3C;
      --white:#FFF;--gray:#8E8E93;--blue:#20D5EC;--green:#34C759;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--white);-webkit-font-smoothing:antialiased;touch-action:pan-y}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,textarea{font-family:inherit}
    .hidden{display:none!important}

    /* ===== AUTH SCREENS ===== */
    #auth-screen{position:fixed;inset:0;z-index:9999;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .auth-logo{font-size:48px;margin-bottom:8px}
    .auth-title{font-size:28px;font-weight:800;margin-bottom:4px}
    .auth-subtitle{color:var(--gray);font-size:14px;margin-bottom:40px}
    .auth-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
    .auth-input{background:var(--dark4);border:1px solid var(--dark5);border-radius:12px;padding:14px 16px;color:var(--white);font-size:15px;outline:none;transition:border-color .2s}
    .auth-input:focus{border-color:var(--primary)}
    .auth-input::placeholder{color:var(--gray)}
    .auth-btn{background:var(--primary);color:var(--white);border-radius:12px;padding:14px;font-size:16px;font-weight:700;transition:opacity .2s}
    .auth-btn:disabled{opacity:.5}
    .auth-btn:hover:not(:disabled){opacity:.9}
    .auth-divider{display:flex;align-items:center;gap:12px;margin:8px 0;color:var(--gray);font-size:13px}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--dark5)}
    .auth-social{display:flex;gap:12px}
    .auth-social button{flex:1;background:var(--dark4);border-radius:12px;padding:12px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
    .auth-toggle{margin-top:16px;color:var(--gray);font-size:14px;text-align:center}
    .auth-toggle a{color:var(--primary);font-weight:600;cursor:pointer;text-decoration:none}
    .auth-error{color:var(--primary);font-size:13px;text-align:center;min-height:20px}
    .auth-avatar-section{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:8px}
    .auth-avatar-preview{width:80px;height:80px;border-radius:50%;background:var(--dark4);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;border:2px dashed var(--dark5)}
    .auth-avatar-preview img{width:100%;height:100%;object-fit:cover}
    .auth-avatar-preview span{font-size:28px}

    /* ===== APP SHELL ===== */
    #app{display:none;height:100%;position:relative}
    #app.active{display:flex;flex-direction:column}
    .screen{display:none;flex:1;overflow:hidden;position:relative}
    .screen.active{display:flex;flex-direction:column}

    /* ===== TAB BAR ===== */
    .tab-bar{height:56px;background:var(--dark);display:flex;align-items:center;justify-content:space-around;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--gray);font-size:10px;font-weight:600;padding:4px 12px;transition:color .2s}
    .tab-item.active{color:var(--white)}
    .tab-item svg{width:24px;height:24px}
    .create-tab-btn{width:44px;height:30px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(255,45,85,.4)}
    .create-tab-btn svg{width:22px;height:22px}

    /* ===== VIDEO FEED ===== */
    .feed-container{flex:1;overflow:hidden;position:relative}
    .feed{height:100%;scroll-snap-type:y mandatory;overflow-y:scroll;scrollbar-width:none}
    .feed::-webkit-scrollbar{display:none}
    .video-slide{height:100%;scroll-snap-align:start;position:relative;background:var(--dark3);flex-shrink:0}
    .video-slide video{width:100%;height:100%;object-fit:cover}
    .video-slide .loading-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
    .video-slide .loading-spinner::after{content:'';width:40px;height:40px;border:3px solid var(--dark5);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .top-header{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;justify-content:center;align-items:center;gap:16px;padding:14px 20px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
    .top-header span{font-size:17px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer}
    .top-header span.active{color:var(--white);font-weight:700}
    .top-header .hdr-div{width:1px;height:16px;background:rgba(255,255,255,.3)}

    .vid-actions{position:absolute;right:10px;bottom:80px;display:flex;flex-direction:column;align-items:center;gap:16px;z-index:10}
    .vid-avatar{position:relative;margin-bottom:6px}
    .vid-avatar img{width:46px;height:46px;border-radius:50%;border:2px solid var(--white);object-fit:cover}
    .vid-avatar .follow-badge{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:20px;height:20px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
    .action-btn{display:flex;flex-direction:column;align-items:center;gap:3px}
    .action-btn svg{width:30px;height:30px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
    .action-btn .cnt{font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.5)}
    .action-btn.liked svg{fill:var(--primary);stroke:var(--primary)}
    .action-btn.bookmarked svg{fill:var(--accent);stroke:var(--accent)}
    .music-disc{width:38px;height:38px;border-radius:50%;border:7px solid var(--dark3);overflow:hidden;animation:spin 4s linear infinite}
    .music-disc img{width:100%;height:100%;object-fit:cover}
    .vid-info{position:absolute;bottom:70px;left:14px;right:76px;z-index:10}
    .vid-info .uname{font-size:16px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.5);display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .vid-info .uname .vbadge{width:16px;height:16px;background:var(--blue);border-radius:50%;font-size:10px;display:inline-flex;align-items:center;justify-content:center}
    .vid-info .desc{font-size:14px;line-height:20px;margin-bottom:8px;text-shadow:0 1px 3px rgba(0,0,0,.5);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .vid-info .song{font-size:13px;text-shadow:0 1px 3px rgba(0,0,0,.5);display:flex;align-items:center;gap:6px}
    .pause-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.15);z-index:5}
    .pause-overlay svg{width:60px;height:60px;opacity:.7}
    .heart-pop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;pointer-events:none;z-index:50;opacity:0}
    .heart-pop.pop{animation:heartPop .8s ease forwards}
    @keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}30%{transform:translate(-50%,-50%) scale(1.2);opacity:1}60%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
    .no-videos{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--gray)}
    .no-videos .big{font-size:48px}

    /* ===== COMMENTS MODAL ===== */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center}
    .comments-modal{background:var(--dark3);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:70vh;display:flex;flex-direction:column}
    .comments-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--dark4)}
    .comments-header h3{font-size:16px;font-weight:700}
    .comments-header button svg{width:24px;height:24px}
    .comments-list{flex:1;overflow-y:auto;padding:12px 16px}
    .comment-item{display:flex;gap:10px;margin-bottom:16px}
    .comment-item img{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .comment-item .cbody{flex:1}
    .comment-item .cbody .cuser{font-size:13px;font-weight:700;margin-bottom:2px}
    .comment-item .cbody .ctext{font-size:14px;line-height:20px}
    .comment-item .cbody .ctime{font-size:11px;color:var(--gray);margin-top:4px}
    .comment-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--dark4);align-items:center}
    .comment-input-row img{width:32px;height:32px;border-radius:50%;object-fit:cover}
    .comment-input-row input{flex:1;background:var(--dark4);border:none;border-radius:20px;padding:10px 16px;color:var(--white);font-size:14px;outline:none}
    .comment-input-row input::placeholder{color:var(--gray)}
    .comment-input-row button{color:var(--primary);font-weight:700;font-size:14px;padding:8px}

    /* ===== DISCOVER ===== */
    .discover{flex:1;overflow-y:auto;padding-top:12px}
    .search-bar{display:flex;align-items:center;gap:8px;background:var(--dark4);border-radius:12px;margin:0 12px 12px;padding:0 12px;height:40px}
    .search-bar svg{width:20px;height:20px;color:var(--gray);flex-shrink:0}
    .search-bar input{flex:1;background:none;border:none;color:var(--white);font-size:15px;outline:none}
    .search-bar input::placeholder{color:var(--gray)}
    .cats{display:flex;gap:8px;padding:0 12px 16px;overflow-x:auto;scrollbar-width:none}
    .cats::-webkit-scrollbar{display:none}
    .cat-chip{padding:8px 16px;border-radius:20px;font-size:14px;font-weight:600;white-space:nowrap;cursor:pointer}
    .sec-title{font-size:18px;font-weight:700;margin:0 12px 12px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
    .grid-tile{aspect-ratio:3/4;background:var(--dark4);position:relative;overflow:hidden;cursor:pointer}
    .grid-tile video,.grid-tile img{width:100%;height:100%;object-fit:cover}
    .grid-tile .g-overlay{position:absolute;bottom:6px;left:6px;display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.5)}

    /* ===== CREATE ===== */
    .create-screen-inner{flex:1;display:flex;flex-direction:column;background:var(--dark2)}
    .create-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}
    .create-hdr .title{font-size:18px;font-weight:700}
    .create-hdr svg{width:28px;height:28px}
    .upload-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
    .upload-box{width:100%;max-width:300px;aspect-ratio:9/16;border:2px dashed var(--dark5);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:border-color .2s;overflow:hidden;position:relative}
    .upload-box:hover{border-color:var(--primary)}
    .upload-box svg{width:48px;height:48px;color:var(--gray)}
    .upload-box .up-text{font-size:16px;font-weight:600;color:var(--gray)}
    .upload-box .up-sub{font-size:13px;color:var(--gray)}
    .upload-box video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .upload-box .remove-preview{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;z-index:5}
    .upload-box .remove-preview svg{width:18px;height:18px;color:var(--white)}
    .upload-form{width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px;padding:0 16px}
    .upload-form textarea{background:var(--dark4);border:1px solid var(--dark5);border-radius:12px;padding:12px;color:var(--white);font-size:14px;resize:none;height:80px;outline:none}
    .upload-form textarea::placeholder{color:var(--gray)}
    .upload-form input{background:var(--dark4);border:1px solid var(--dark5);border-radius:12px;padding:12px;color:var(--white);font-size:14px;outline:none}
    .upload-form input::placeholder{color:var(--gray)}
    .upload-btn{background:var(--primary);color:var(--white);border-radius:12px;padding:14px;font-size:16px;font-weight:700;transition:opacity .2s}
    .upload-btn:disabled{opacity:.5}
    .upload-progress{width:100%;max-width:400px;padding:0 16px}
    .progress-bar{height:4px;background:var(--dark4);border-radius:2px;overflow:hidden}
    .progress-bar .fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s;width:0%}
    .progress-text{text-align:center;font-size:13px;color:var(--gray);margin-top:8px}

    /* ===== INBOX ===== */
    .inbox{flex:1;overflow-y:auto;padding-top:12px}
    .inbox-hdr{display:flex;justify-content:space-between;align-items:center;padding:0 16px 12px}
    .inbox-hdr h2{font-size:22px;font-weight:700}
    .inbox-tabs{display:flex;gap:12px;padding:0 16px 12px}
    .inbox-tab{padding:6px 16px;border-radius:20px;background:var(--dark4);font-size:14px;font-weight:600;color:var(--gray)}
    .inbox-tab.active{background:var(--white);color:var(--dark)}
    .notif-list{padding:0 16px}
    .notif-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--dark4)}
    .notif-item img{width:44px;height:44px;border-radius:50%;object-fit:cover}
    .notif-item .n-body{flex:1}
    .notif-item .n-body .n-text{font-size:14px;line-height:20px}
    .notif-item .n-body .n-text strong{font-weight:700}
    .notif-item .n-body .n-time{font-size:12px;color:var(--gray);margin-top:2px}

    /* ===== PROFILE ===== */
    .profile{flex:1;overflow-y:auto;padding-top:12px}
    .prof-hdr{display:flex;justify-content:space-between;align-items:center;padding:0 16px 12px}
    .prof-hdr .uname{font-size:18px;font-weight:700}
    .prof-hdr svg{width:24px;height:24px;cursor:pointer}
    .prof-section{display:flex;flex-direction:column;align-items:center;padding:0 16px 16px}
    .prof-avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;margin-bottom:12px}
    .prof-name{font-size:16px;font-weight:600;margin-bottom:16px}
    .stats-row{display:flex;align-items:center;gap:24px;margin-bottom:16px}
    .stat-item{text-align:center}
    .stat-item .num{font-size:18px;font-weight:700}
    .stat-item .label{font-size:12px;color:var(--gray);margin-top:2px}
    .stat-div{width:1px;height:20px;background:var(--dark5)}
    .prof-actions{display:flex;gap:8px;margin-bottom:12px}
    .edit-btn{background:var(--dark4);border-radius:6px;padding:10px 40px;font-size:15px;font-weight:600}
    .icon-sq{background:var(--dark4);width:40px;height:40px;border-radius:6px;display:flex;align-items:center;justify-content:center}
    .icon-sq svg{width:20px;height:20px}
    .prof-bio{font-size:14px;text-align:center;margin-bottom:16px}
    .prof-tabs{display:flex;border-bottom:1px solid var(--dark4)}
    .prof-tab{flex:1;text-align:center;padding:12px;border-bottom:2px solid transparent;color:var(--gray)}
    .prof-tab.active{border-bottom-color:var(--white);color:var(--white)}
    .prof-tab svg{width:20px;height:20px}
    .logout-btn{margin:24px 16px;background:var(--dark4);border-radius:12px;padding:14px;font-size:15px;font-weight:600;color:var(--primary);text-align:center}

    /* Edit profile modal */
    .edit-modal{position:fixed;inset:0;z-index:600;background:var(--dark);display:flex;flex-direction:column;padding:20px}
    .edit-modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .edit-modal-hdr h3{font-size:18px;font-weight:700}
    .edit-modal-hdr button{color:var(--primary);font-weight:700;font-size:15px}
    .edit-avatar-sec{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:24px}
    .edit-avatar-sec img{width:80px;height:80px;border-radius:50%;object-fit:cover}
    .edit-avatar-sec .change-txt{color:var(--primary);font-size:14px;font-weight:600;cursor:pointer}
    .edit-fields{display:flex;flex-direction:column;gap:16px}
    .edit-field label{font-size:13px;color:var(--gray);margin-bottom:4px;display:block}
    .edit-field input,.edit-field textarea{width:100%;background:var(--dark4);border:1px solid var(--dark5);border-radius:10px;padding:12px;color:var(--white);font-size:15px;outline:none}
    .edit-field textarea{resize:none;height:70px}

    /* Toast */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--dark4);color:var(--white);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;transition:transform .3s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast.error{background:var(--primary)}
    .toast.success{background:var(--green)}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ===== AUTH ===== -->
<div id="auth-screen">
  <div class="auth-logo">🇧🇹</div>
  <div class="auth-title">Zhingkham</div>
  <div class="auth-subtitle">Share your world</div>
  <div class="auth-form" id="auth-form">
    <div class="auth-avatar-section hidden" id="signup-avatar-section">
      <div class="auth-avatar-preview" id="avatar-preview" onclick="document.getElementById('avatar-input').click()">
        <span>📷</span>
      </div>
      <input type="file" id="avatar-input" accept="image/*" class="hidden">
      <span style="font-size:12px;color:var(--gray)">Tap to add profile photo</span>
    </div>
    <input class="auth-input hidden" id="auth-name" type="text" placeholder="Display name">
    <input class="auth-input" id="auth-email" type="email" placeholder="Email">
    <input class="auth-input" id="auth-pass" type="password" placeholder="Password">
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Log In</button>
    <div class="auth-divider">or</div>
    <div class="auth-social">
      <button onclick="googleSignIn()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
    </div>
    <div class="auth-toggle" id="auth-toggle">
      Don't have an account? <a onclick="toggleAuthMode()">Sign Up</a>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <!-- Home -->
  <div id="screen-home" class="screen active">
    <div class="feed-container">
      <div class="top-header">
        <span onclick="setFeedMode('following')" id="hdr-following">Following</span>
        <div class="hdr-div"></div>
        <span onclick="setFeedMode('foryou')" id="hdr-foryou" class="active">For You</span>
      </div>
      <div class="feed" id="feed"></div>
    </div>
  </div>

  <!-- Discover -->
  <div id="screen-discover" class="screen">
    <div class="discover">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="Search Zhingkham" id="search-input" oninput="handleSearch()">
      </div>
      <div class="cats" id="cats"></div>
      <div class="sec-title">Trending Now</div>
      <div class="grid" id="discover-grid"></div>
    </div>
  </div>

  <!-- Create -->
  <div id="screen-create" class="screen">
    <div class="create-screen-inner">
      <div class="create-hdr">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" onclick="switchTab('home')"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span class="title">Upload Video</span>
        <div style="width:28px"></div>
      </div>
      <div class="upload-area">
        <div class="upload-box" id="upload-box">

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-btn');
  errEl.textContent = '';

  if (!email || !pass) { errEl.textContent = 'Please fill in all fields'; return; }
  if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return; }

  btn.disabled = true;
  btn.textContent = isSignUp ? 'Creating account...' : 'Logging in...';

  try {
    if (isSignUp) {
      const name = document.getElementById('auth-name').value.trim();
      if (!name) { errEl.textContent = 'Please enter your name'; btn.disabled = false; btn.textContent = 'Sign Up'; return; }
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      const avatarURL = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=FF2D55&color=fff&size=200`;
      await cred.user.updateProfile({ displayName: name, photoURL: avatarURL });
      await db.collection('users').doc(cred.user.uid).set({
        displayName: name,
        username: name.toLowerCase().replace(/\s+/g, '_'),
        avatar: avatarURL,
        bio: '',
        followers: 0,
        following: 0,
        likes: 0,
        verified: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } else {
      await auth.signInWithEmailAndPassword(email, pass);
    }
  } catch (e) {
    const msgs = {
      'auth/email-already-in-use': 'Email already in use',
      'auth/invalid-email': 'Invalid email address',
      'auth/user-not-found': 'No account found with this email',
      'auth/wrong-password': 'Incorrect password',
      'auth/invalid-credential': 'Invalid email or password',
    };
    errEl.textContent = msgs[e.code] || e.message;
    btn.disabled = false;
    btn.textContent = isSignUp ? 'Sign Up' : 'Log In';
  }
}

function fmt(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 604800) return Math.floor(s / 86400) + 'd ago';
  return d.toLocaleDateString();
}

async function loadFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '<div class="no-videos"><div class="big">📱</div><div>Loading videos...</div></div>';

  try {
    let q = db.collection('videos').orderBy('createdAt', 'desc').limit(50);
    if (feedMode === 'following' && currentUser) {
      const followSnap = await db.collection('users').doc(currentUser.uid).collection('following').get();
      const followIds = followSnap.docs.map(d => d.id);
      if (followIds.length > 0) {
        q = db.collection('videos').where('userId', 'in', followIds.slice(0, 10)).orderBy('createdAt', 'desc').limit(50);
      } else {
        feed.innerHTML = '<div class="no-videos"><div class="big">👀</div><div>Follow some creators to see their videos here</div></div>';
        return;
      }
    }

    const snap = await q.get();
    allVideos = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (allVideos.length === 0) {
      feed.innerHTML = '<div class="no-videos"><div class="big">🎬</div><div>No videos yet — be the first to post!</div></div>';
      return;
    }

    feed.innerHTML = '';
    for (const v of allVideos) {
      feed.appendChild(createVideoSlide(v));
    }

    setupVideoObserver();
  } catch (e) {
    console.error('Feed error:', e);
    feed.innerHTML = '<div class="no-videos"><div class="big">⚠️</div><div>Could not load videos</div></div>';
  }
}

function createVideoSlide(v) {
  const slide = document.createElement('div');
  slide.className = 'video-slide';
  slide.dataset.id = v.id;

  const isLiked = v.likedBy?.includes(currentUser?.uid);
  const isBookmarked = v.bookmarkedBy?.includes(currentUser?.uid);

  slide.innerHTML = `
    <div class="loading-spinner"></div>
    <video src="${v.videoURL}" loop playsinline preload="metadata" poster="${v.thumbnail || ''}"></video>
    <div class="pause-overlay hidden"><svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21"/></svg></div>
    <div class="heart-pop">❤️</div>
    <div class="vid-actions">
      <div class="vid-avatar" onclick="viewUserProfile('${v.userId}')">
        <img src="${v.userAvatar || ''}" alt="">
        ${v.userId !== currentUser?.uid ? '<div class="follow-badge" onclick="event.stopPropagation();toggleFollow(\''+v.userId+'\')">+</div>' : ''}
      </div>
      <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${v.id}')">
        <svg viewBox="0 0 24 24" fill="${isLiked ? 'var(--primary)' : 'none'}" stroke="${isLiked ? 'var(--primary)' : 'white'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        <span class="cnt">${fmt(v.likes || 0)}</span>
      </button>
      <button class="action-btn" onclick="openComments('${v.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span class="cnt">${fmt(v.comments || 0)}</span>
      </button>
      <button class="action-btn ${isBookmarked ? 'bookmarked' : ''}" onclick="toggleBookmark('${v.id}')">
        <svg viewBox="0 0 24 24" fill="${isBookmarked ? 'var(--accent)' : 'none'}" stroke="${isBookmarked ? 'var(--accent)' : 'white'}" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span class="cnt">${fmt(v.bookmarks || 0)}</span>
      </button>
      <button class="action-btn" onclick="shareVideo('${v.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        <span class="cnt">${fmt(v.shares || 0)}</span>
      </button>
      <div class="music-disc"><img src="${v.userAvatar || ''}" alt=""></div>
    </div>
    <div class="vid-info">
      <div class="uname">@${v.username || 'user'} ${v.verified ? '<span class="vbadge">✓</span>' : ''}</div>
      <div class="desc">${v.caption || ''}</div>
      <div class="song">♫ ${v.song || 'Original Sound'}</div>
    </div>
  `;

  const video = slide.querySelector('video');
  const pauseEl = slide.querySelector('.pause-overlay');
  const spinner = slide.querySelector('.loading-spinner');

  video.addEventListener('loadeddata', () => spinner.remove());
  video.addEventListener('error', () => { spinner.innerHTML = '<span style="color:var(--gray)">Video unavailable</span>'; });

  let lastTap = 0;
  slide.addEventListener('click', (e) => {
    if (e.target.closest('.vid-actions') || e.target.closest('.vid-avatar')) return;
    const now = Date.now();
    if (now - lastTap < 300) {
      const heart = slide.querySelector('.heart-pop');
      heart.classList.remove('pop');
      void heart.offsetWidth;
      heart.classList.add('pop');
      const likeBtn = slide.querySelector('.action-btn');
      if (!likeBtn.classList.contains('liked')) toggleLike(v.id);
    } else {
      setTimeout(() => {
        if (Date.now() - lastTap >= 300) {
          if (video.paused) { video.play(); pauseEl.classList.add('hidden'); }
          else { video.pause(); pauseEl.classList.remove('hidden'); }
        }
      }, 300);
    }
    lastTap = now;
  });

  return slide;
}

function setupVideoObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      if (entry.isIntersecting) {
        video.play().catch(() => {});
        entry.target.querySelector('.pause-overlay')?.classList.add('hidden');
      } else {
        video.pause();
      }
    });
  }, { threshold: 0.6 });

  document.querySelectorAll('.video-slide').forEach(s => observer.observe(s));
}

function setFeedMode(mode) {
  feedMode = mode;
  document.getElementById('hdr-foryou').classList.toggle('active', mode === 'foryou');
  document.getElementById('hdr-following').classList.toggle('active', mode === 'following');
  loadFeed();
}

// ============================================================
// LIKES, BOOKMARKS, SHARES, FOLLOWS
// ============================================================
async function toggleLike(videoId) {
  if (!currentUser) return;
  const ref = db.collection('videos').doc(videoId);
  const doc = await ref.get();
  if (!doc.exists) return;

  const data = doc.data();
  const likedBy = data.likedBy || [];
  const isLiked = likedBy.includes(currentUser.uid);

  await ref.update({
    likedBy: isLiked
      ? firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
      : firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
    likes: firebase.firestore.FieldValue.increment(isLiked ? -1 : 1),
  });

  if (!isLiked && data.userId !== currentUser.uid) {
    addNotification(data.userId, 'like', `liked your video`);
  }

  refreshSlide(videoId);
}

async function toggleBookmark(videoId) {
  if (!currentUser) return;
  const ref = db.collection('videos').doc(videoId);
  const doc = await ref.get();
  if (!doc.exists) return;

  const data = doc.data();
  const bookmarkedBy = data.bookmarkedBy || [];
  const isBookmarked = bookmarkedBy.includes(currentUser.uid);

  await ref.update({
    bookmarkedBy: isBookmarked
      ? firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
      : firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
    bookmarks: firebase.firestore.FieldValue.increment(isBookmarked ? -1 : 1),
  });

  const slide = document.querySelector(`.video-slide[data-id="${videoId}"]`);
  if (slide) {
    const btn = slide.querySelectorAll('.action-btn')[2];
    btn.classList.toggle('bookmarked');
    const svg = btn.querySelector('svg');
    const isNowBookmarked = btn.classList.contains('bookmarked');
    svg.setAttribute('fill', isNowBookmarked ? 'var(--accent)' : 'none');
    svg.setAttribute('stroke', isNowBookmarked ? 'var(--accent)' : 'white');
  }

  toast(isBookmarked ? 'Removed from bookmarks' : 'Saved to bookmarks', 'success');
}

async function shareVideo(videoId) {
  const url = window.location.origin + window.location.pathname + '#video=' + videoId;
  if (navigator.share) {
    try {
      await navigator.share({ title: 'Check this out on Zhingkham!', url });
      await db.collection('videos').doc(videoId).update({ shares: firebase.firestore.FieldValue.increment(1) });
    } catch (e) {}
  } else {
    await navigator.clipboard?.writeText(url);
    toast('Link copied!', 'success');
    await db.collection('videos').doc(videoId).update({ shares: firebase.firestore.FieldValue.increment(1) });
  }
}

async function toggleFollow(userId) {
  if (!currentUser || userId === currentUser.uid) return;
  const followRef = db.collection('users').doc(currentUser.uid).collection('following').doc(userId);
  const doc = await followRef.get();

  if (doc.exists) {
    await followRef.delete();
    await db.collection('users').doc(currentUser.uid).update({ following: firebase.firestore.FieldValue.increment(-1) });
    await db.collection('users').doc(userId).update({ followers: firebase.firestore.FieldValue.increment(-1) });
    toast('Unfollowed', '');
  } else {
    await followRef.set({ followedAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('users').doc(currentUser.uid).update({ following: firebase.firestore.FieldValue.increment(1) });
    await db.collection('users').doc(userId).update({ followers: firebase.firestore.FieldValue.increment(1) });
    addNotification(userId, 'follow', 'started following you');
    toast('Following!', 'success');
  }
  await loadUserProfile();
  renderProfile();
}

async function refreshSlide(videoId) {
  const doc = await db.collection('videos').doc(videoId).get();
  if (!doc.exists) return;
  const v = { id: doc.id, ...doc.data() };
  const oldSlide = document.querySelector(`.video-slide[data-id="${videoId}"]`);
  if (oldSlide) {
    const wasPlaying = !oldSlide.querySelector('video').paused;
    const newSlide = createVideoSlide(v);
    oldSlide.replaceWith(newSlide);
    if (wasPlaying) newSlide.querySelector('video').play().catch(() => {});
  }
}

async function openComments(videoId) {
  currentVideoId = videoId;
  document.getElementById('comments-modal').classList.remove('hidden');
  document.getElementById('comment-avatar').src = userProfile?.avatar || '';

  const list = document.getElementById('comments-list');
  list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray)">Loading...</div>';

  const snap = await db.collection('videos').doc(videoId).collection('comments').orderBy('createdAt', 'desc').get();
  const comments = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  document.getElementById('comments-count').textContent = `${comments.length} Comments`;

  if (comments.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray)">No comments yet. Be the first!</div>';
    return;
  }

  list.innerHTML = comments.map(c => `
    <div class="comment-item">
      <img src="${c.avatar || ''}" alt="">
      <div class="cbody">
        <div class="cuser">@${c.username || 'user'}</div>
        <div class="ctext">${escapeHtml(c.text)}</div>
        <div class="ctime">${timeAgo(c.createdAt)}</div>
      </div>
    </div>
  `).join('');
}

async function postComment() {
  if (!currentVideoId || !currentUser) return;
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  await db.collection('videos').doc(currentVideoId).collection('comments').add({
    userId: currentUser.uid,
    username: userProfile?.username || 'user',
    avatar: userProfile?.avatar || '',
    text,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });

  await db.collection('videos').doc(currentVideoId).update({
    comments: firebase.firestore.FieldValue.increment(1),
  });

  const vidDoc = await db.collection('videos').doc(currentVideoId).get();
  if (vidDoc.exists && vidDoc.data().userId !== currentUser.uid) {
    addNotification(vidDoc.data().userId, 'comment', `commented: "${text.slice(0, 50)}"`);
  }

  openComments(currentVideoId);
  refreshSlide(currentVideoId);
}

function closeComments() {
  document.getElementById('comments-modal').classList.add('hidden');
  currentVideoId = null;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============================================================
// NOTIFICATIONS
// ============================================================
async function addNotification(toUserId, type, text) {
  if (!currentUser) return;
  await db.collection('users').doc(toUserId).collection('notifications').add({
    fromUserId: currentUser.uid,
    fromUsername: userProfile?.username || 'user',
    fromAvatar: userProfile?.avatar || '',
    type,
    text,
    read: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

async function loadNotifications() {
  if (!currentUser) return;
  const snap = await db.collection('users').doc(currentUser.uid).collection('notifications')
    .orderBy('createdAt', 'desc').limit(30).get();

  const list = document.getElementById('notif-list');
  const notifs = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  if (notifs.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray)">No notifications yet</div>';
    return;
  }

  const colors = { like: '#FF2D55', follow: '#5856D6', comment: '#FF9500', mention: '#34C759' };
  list.innerHTML = notifs.map(n => `
    <div class="notif-item">
      <img src="${n.fromAvatar || ''}" alt="">
      <div class="n-body">
        <div class="n-text"><strong>${n.fromUsername}</strong> ${escapeHtml(n.text)}</div>
        <div class="n-time">${timeAgo(n.createdAt)}</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="${colors[n.type] || '#fff'}"><circle cx="12" cy="12" r="5"/></svg>
    </div>
  `).join('');
}

const CATEGORIES = [
  { label: '🔥 Trending', color: '#FF2D55' },
  { label: '💃 Dance', color: '#5856D6' },
  { label: '🍲 Food', color: '#FF9500' },
  { label: '🏛️ Culture', color: '#34C759' },
  { label: '✈️ Travel', color: '#007AFF' },
  { label: '🎵 Music', color: '#AF52DE' },
  { label: '😂 Comedy', color: '#FFD60A' },
  { label: '⚽ Sports', color: '#30D158' },
];

function loadDiscover() {
  const cats = document.getElementById('cats');
  cats.innerHTML = CATEGORIES.map(c =>
    `<div class="cat-chip" style="background:${c.color}22;color:${c.color}" onclick="searchCategory('${c.label.split(' ')[1]}')">${c.label}</div>`
  ).join('');

  renderDiscoverGrid(allVideos);
}

function renderDiscoverGrid(videos) {
  const grid = document.getElementById('discover-grid');
  if (videos.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray)">No videos found</div>';
    return;
  }
  grid.innerHTML = videos.map(v => `
    <div class="grid-tile" onclick="goToVideo('${v.id}')">
      <video src="${v.videoURL}" preload="metadata" muted></video>
      <div class="g-overlay">▶ ${fmt(v.likes || 0)}</div>
    </div>
  `).join('');
}

function searchCategory(term) {
  document.getElementById('search-input').value = term;
  handleSearch();
}

function handleSearch() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { renderDiscoverGrid(allVideos); return; }
  const filtered = allVideos.filter(v =>
    (v.caption || '').toLowerCase().includes(q) ||
    (v.username || '').toLowerCase().includes(q) ||
    (v.song || '').toLowerCase().includes(q)
  );
  renderDiscoverGrid(filtered);
}

function goToVideo(videoId) {
  switchTab('home');
  const slide = document.querySelector(`.video-slide[data-id="${videoId}"]`);
  if (slide) slide.scrollIntoView({ behavior: 'smooth' });
}

  for (const v of SAMPLE_VIDEOS) {
    await db.collection('videos').add({
      userId: 'sample_' + v.username,
      username: v.username,
      userAvatar: v.avatar,

function handleVideoUrlPreview() {
  const url = document.getElementById('vid-url').value.trim();
  const box = document.getElementById('upload-box');
  if (!url) {
    box.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      <span class="up-text">Paste a video URL above</span>
      <span class="up-sub">MP4, WebM links supported</span>
    `;
    return;
  }
  box.innerHTML = `
    <video src="${url}" autoplay loop muted playsinline></video>
    <div class="remove-preview" onclick="event.stopPropagation();document.getElementById('vid-url').value='';handleVideoUrlPreview()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </div>
  `;
}

async function uploadVideo() {
  if (!currentUser) return;
  const btn = document.getElementById('upload-btn');
  const videoURL = document.getElementById('vid-url').value.trim();
  const caption = document.getElementById('vid-caption').value.trim();
  const song = document.getElementById('vid-song').value.trim();

  if (!videoURL) { toast('Please paste a video URL', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Posting...';

  try {
    await db.collection('videos').add({
      userId: currentUser.uid,
      username: userProfile?.username || 'user',
      userAvatar: userProfile?.avatar || '',
      displayName: userProfile?.displayName || 'User',
      verified: userProfile?.verified || false,
      videoURL,
      caption,
      song: song || 'Original Sound - ' + (userProfile?.username || 'user'),
      likes: 0,
      comments: 0,
      shares: 0,
      bookmarks: 0,
      likedBy: [],
      bookmarkedBy: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });

    toast('Video posted! 🎉', 'success');

    setTimeout(() => {
      document.getElementById('vid-url').value = '';
      document.getElementById('vid-caption').value = '';
      document.getElementById('vid-song').value = '';
      handleVideoUrlPreview();
      btn.disabled = false;
      btn.textContent = 'Post';
      switchTab('home');
      loadFeed();
    }, 1500);
  } catch (e) {
    console.error('Upload error:', e);
    toast('Post failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Post';
  }
}

function viewUserProfile(userId) {
  if (userId === currentUser?.uid) { switchTab('profile'); return; }
  toast('User profiles coming soon!', '');
}

function openEditProfile() {
  document.getElementById('edit-modal').classList.remove('hidden');
  document.getElementById('edit-avatar-img').src = userProfile?.avatar || '';
  document.getElementById('edit-name').value = userProfile?.displayName || '';
  document.getElementById('edit-username').value = userProfile?.username || '';
  document.getElementById('edit-bio').value = userProfile?.bio || '';
  editAvatarFile = null;
}

function closeEditProfile() {
  document.getElementById('edit-modal').classList.add('hidden');
}

function handleEditAvatar(e) {
  const file = e.target.files[0];
  if (!file) return;
  editAvatarFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('edit-avatar-img').src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  if (!currentUser) return;
  const name = document.getElementById('edit-name').value.trim();
  const username = document.getElementById('edit-username').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
  const bio = document.getElementById('edit-bio').value.trim();

  if (!name || !username) { toast('Name and username are required', 'error'); return; }

  try {
    let avatar = userProfile.avatar;
    if (editAvatarFile) {
      // Convert to data URL since Storage is not enabled
      avatar = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (ev) => resolve(ev.target.result);
        reader.readAsDataURL(editAvatarFile);
      });
    }

    await db.collection('users').doc(currentUser.uid).update({
      displayName: name,
      username,
      bio,
      avatar,
    });

    await currentUser.updateProfile({ displayName: name, photoURL: avatar });
    await loadUserProfile();
    renderProfile();
    closeEditProfile();
    toast('Profile updated!', 'success');
  } catch (e) {
    toast('Failed to update: ' + e.message, 'error');
  }
}

// ============================================================
// TAB NAVIGATION
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');

  const tabs = document.querySelectorAll('.tab-item');
  const idx = { home: 0, discover: 1, create: 2, inbox: 3, profile: 4 }[name];
  if (tabs[idx]) tabs[idx].classList.add('active');

  // Pause videos when not on home
  if (name !== 'home') {
    document.querySelectorAll('.video-slide video').forEach(v => v.pause());
  }

  // Refresh data when switching tabs
  if (name === 'inbox') loadNotifications();
  if (name === 'profile') { loadUserProfile().then(renderProfile); }
  if (name === 'discover') loadDiscover();
  if (name === 'home') loadFeed();
}
