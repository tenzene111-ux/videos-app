<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zhingkham — Best Short Video App</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇧🇹</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#FF2D55;--secondary:#5856D6;--accent:#FF9500;
      --dark:#000;--dark2:#0A0A0A;--dark3:#1C1C1E;--dark4:#2C2C2E;--dark5:#3A3A3C;
      --white:#FFF;--gray:#8E8E93;--blue:#20D5EC;--green:#34C759;
    }
    body{font-family:'Inter',sans-serif;background:#111;color:var(--white);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}

    /* ===== PHONE FRAME ===== */
    .phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:20px}
    .phone-label{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
    .phone-sub{color:var(--gray);font-size:14px;margin-top:-12px}
    .phone-frame{
      width:375px;height:812px;
      border-radius:50px;
      border:6px solid #333;
      overflow:hidden;
      position:relative;
      background:var(--dark);
      box-shadow:0 0 0 2px #111,0 20px 60px rgba(0,0,0,.6),0 0 80px rgba(255,45,85,.1);
    }
    .phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:34px;background:#333;border-radius:0 0 20px 20px;z-index:999}
    .phone-notch::after{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:60px;height:8px;background:#222;border-radius:4px}
    .phone-home{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:140px;height:5px;background:var(--white);border-radius:3px;z-index:999;opacity:.3}
    .phone-inner{width:100%;height:100%;overflow:hidden;position:relative;display:flex;flex-direction:column}

    /* ===== SCREENS ===== */
    .screen{display:none;flex:1;overflow:hidden;position:relative;flex-direction:column}
    .screen.active{display:flex}
    .hidden{display:none!important}

    /* ===== TAB BAR ===== */
    .tab-bar{height:52px;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:space-around;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
    .tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--gray);font-size:9px;font-weight:600;padding:4px 12px;transition:color .2s;background:none;border:none;cursor:pointer}
    .tab-item.active{color:var(--white)}
    .tab-item svg{width:22px;height:22px}
    .create-tab-btn{width:38px;height:26px;background:linear-gradient(135deg,var(--secondary),var(--primary));border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(255,45,85,.4)}
    .create-tab-btn svg{width:18px;height:18px}

    /* ===== VIDEO FEED ===== */
    .feed{flex:1;scroll-snap-type:y mandatory;overflow-y:scroll;scrollbar-width:none}
    .feed::-webkit-scrollbar{display:none}
    .video-slide{height:100%;scroll-snap-align:start;position:relative;background:var(--dark3);flex-shrink:0}
    .video-slide video{width:100%;height:100%;object-fit:cover}

    .top-header{position:absolute;top:38px;left:0;right:0;z-index:20;display:flex;justify-content:center;align-items:center;gap:16px;padding:0 20px}
    .top-header span{font-size:15px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:color .2s}
    .top-header span.active{color:var(--white);font-weight:700}
    .top-header .hdr-div{width:1px;height:14px;background:rgba(255,255,255,.3)}

    .vid-actions{position:absolute;right:8px;bottom:70px;display:flex;flex-direction:column;align-items:center;gap:14px;z-index:10}
    .vid-avatar{position:relative;margin-bottom:4px}
    .vid-avatar img{width:40px;height:40px;border-radius:50%;border:2px solid var(--white);object-fit:cover}
    .follow-badge{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:18px;height:18px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
    .action-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--white);cursor:pointer}
    .action-btn svg{width:26px;height:26px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
    .action-btn .cnt{font-size:11px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.5)}
    .action-btn.liked svg{fill:var(--primary);stroke:var(--primary)}
    .action-btn.bookmarked svg{fill:var(--accent);stroke:var(--accent)}
    .music-disc{width:32px;height:32px;border-radius:50%;border:6px solid var(--dark3);overflow:hidden;animation:spin 4s linear infinite;margin-top:2px}
    .music-disc img{width:100%;height:100%;object-fit:cover}
    @keyframes spin{to{transform:rotate(360deg)}}

    .vid-info{position:absolute;bottom:60px;left:12px;right:65px;z-index:10}
    .vid-info .uname{font-size:14px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.5);display:flex;align-items:center;gap:5px;margin-bottom:5px}
    .vid-info .uname .vbadge{width:14px;height:14px;background:var(--blue);border-radius:50%;font-size:8px;display:inline-flex;align-items:center;justify-content:center}
    .vid-info .desc{font-size:12px;line-height:17px;margin-bottom:6px;text-shadow:0 1px 3px rgba(0,0,0,.5);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .vid-info .song{font-size:11px;text-shadow:0 1px 3px rgba(0,0,0,.5);display:flex;align-items:center;gap:5px}

    .pause-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.15);z-index:5}
    .pause-overlay svg{width:50px;height:50px;opacity:.7}
    .heart-pop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:70px;pointer-events:none;z-index:50;opacity:0}
    .heart-pop.pop{animation:heartPop .8s ease forwards}
    @keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}30%{transform:translate(-50%,-50%) scale(1.2);opacity:1}60%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

    /* ===== COMMENTS MODAL ===== */
    .modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end}
    .comments-modal{background:var(--dark3);border-radius:14px 14px 0 0;width:100%;max-height:55%;display:flex;flex-direction:column}
    .comments-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--dark4)}
    .comments-header h3{font-size:14px;font-weight:700}
    .comments-header button{background:none;border:none;color:var(--white);cursor:pointer}
    .comments-header button svg{width:20px;height:20px}
    .comments-list{flex:1;overflow-y:auto;padding:10px 14px}
    .comment-item{display:flex;gap:8px;margin-bottom:14px}
    .comment-item img{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .comment-item .cbody{flex:1}
    .comment-item .cbody .cuser{font-size:11px;font-weight:700;margin-bottom:2px}
    .comment-item .cbody .ctext{font-size:12px;line-height:17px}
    .comment-item .cbody .ctime{font-size:10px;color:var(--gray);margin-top:3px}
    .comment-input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--dark4);align-items:center}
    .comment-input-row img{width:28px;height:28px;border-radius:50%;object-fit:cover}
    .comment-input-row input{flex:1;background:var(--dark4);border:none;border-radius:18px;padding:8px 14px;color:var(--white);font-size:13px;outline:none}
    .comment-input-row input::placeholder{color:var(--gray)}
    .comment-input-row button{color:var(--primary);font-weight:700;font-size:13px;padding:6px;background:none;border:none;cursor:pointer}

    /* ===== DISCOVER ===== */
    .discover{flex:1;overflow-y:auto;padding-top:44px}
    .discover-title{font-size:20px;font-weight:800;padding:8px 14px 4px}
    .search-bar{display:flex;align-items:center;gap:8px;background:var(--dark4);border-radius:10px;margin:8px 12px;padding:0 10px;height:36px}
    .search-bar svg{width:18px;height:18px;color:var(--gray);flex-shrink:0}
    .search-bar input{flex:1;background:none;border:none;color:var(--white);font-size:14px;outline:none}
    .search-bar input::placeholder{color:var(--gray)}
    .cats{display:flex;gap:6px;padding:4px 12px 12px;overflow-x:auto;scrollbar-width:none}
    .cats::-webkit-scrollbar{display:none}
    .cat-chip{padding:6px 14px;border-radius:18px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:transform .15s}
    .cat-chip:active{transform:scale(.95)}
    .sec-title{font-size:15px;font-weight:700;margin:4px 12px 8px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px}
    .grid-tile{aspect-ratio:3/4;background:var(--dark4);position:relative;overflow:hidden;cursor:pointer}
    .grid-tile video,.grid-tile img{width:100%;height:100%;object-fit:cover}
    .grid-tile .g-overlay{position:absolute;bottom:4px;left:5px;display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.5)}

    /* ===== CREATE ===== */
    .create-inner{flex:1;display:flex;flex-direction:column;background:var(--dark2);padding-top:44px}
    .create-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px}
    .create-hdr .title{font-size:16px;font-weight:700}
    .create-hdr svg{width:24px;height:24px;cursor:pointer}
    .camera-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--dark3);margin:10px;border-radius:16px;gap:10px}
    .camera-area svg{width:50px;height:50px;color:var(--gray)}
    .camera-area .cam-text{font-size:15px;font-weight:600;color:var(--gray)}
    .camera-area .cam-sub{font-size:12px;color:var(--gray)}
    .create-controls{padding:12px 14px 16px;display:flex;flex-direction:column;align-items:center;gap:14px}
    .duration-row{display:flex;gap:14px}
    .duration-row span{font-size:12px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer}
    .duration-row span.active{color:var(--white)}
    .record-btn{width:68px;height:68px;border-radius:50%;border:4px solid var(--primary);display:flex;align-items:center;justify-content:center;cursor:pointer;background:none}
    .record-btn-inner{width:52px;height:52px;border-radius:50%;background:var(--primary);transition:all .2s}
    .record-btn:hover .record-btn-inner{border-radius:8px;width:32px;height:32px}
    .mode-row{display:flex;gap:18px}
    .mode-row span{font-size:13px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer}
    .mode-row span.active{color:var(--white)}

    /* ===== INBOX ===== */
    .inbox{flex:1;overflow-y:auto;padding-top:44px}
    .inbox-hdr{padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
    .inbox-hdr h2{font-size:20px;font-weight:800}
    .inbox-tabs{display:flex;gap:8px;padding:4px 14px 10px}
    .inbox-tab{padding:5px 14px;border-radius:18px;background:var(--dark4);font-size:12px;font-weight:600;color:var(--gray);border:none;cursor:pointer}
    .inbox-tab.active{background:var(--white);color:var(--dark)}
    .notif-list{padding:0 14px}
    .notif-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;transition:background .15s}
    .notif-item:active{background:rgba(255,255,255,.03)}
    .notif-item img{width:38px;height:38px;border-radius:50%;object-fit:cover}
    .notif-item .n-body{flex:1}
    .notif-item .n-body .n-text{font-size:13px;line-height:18px}
    .notif-item .n-body .n-text strong{font-weight:700}
    .notif-item .n-body .n-time{font-size:11px;color:var(--gray);margin-top:2px}

    /* ===== PROFILE ===== */
    .profile{flex:1;overflow-y:auto;padding-top:44px}
    .prof-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px}
    .prof-hdr .uname{font-size:16px;font-weight:700}
    .prof-hdr svg{width:22px;height:22px;cursor:pointer}
    .prof-section{display:flex;flex-direction:column;align-items:center;padding:8px 14px 14px}
    .prof-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:10px}
    .prof-name{font-size:14px;font-weight:600;margin-bottom:14px}
    .stats-row{display:flex;align-items:center;gap:20px;margin-bottom:14px}
    .stat-item{text-align:center}
    .stat-item .num{font-size:16px;font-weight:700}
    .stat-item .label{font-size:11px;color:var(--gray);margin-top:1px}
    .stat-div{width:1px;height:18px;background:var(--dark5)}
    .prof-actions{display:flex;gap:6px;margin-bottom:10px}
    .edit-btn{background:var(--dark4);border-radius:6px;padding:8px 32px;font-size:13px;font-weight:600;border:none;color:var(--white);cursor:pointer}
    .icon-sq{background:var(--dark4);width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;border:none;color:var(--white);cursor:pointer}
    .icon-sq svg{width:18px;height:18px}
    .prof-bio{font-size:13px;text-align:center;margin-bottom:14px}
    .prof-tabs{display:flex;border-bottom:1px solid var(--dark4)}
    .prof-tab{flex:1;text-align:center;padding:10px;border-bottom:2px solid transparent;color:var(--gray);background:none;border-top:none;border-left:none;border-right:none;cursor:pointer}
    .prof-tab.active{border-bottom-color:var(--white);color:var(--white)}
    .prof-tab svg{width:18px;height:18px}

    /* ===== TOAST ===== */
    .toast{position:absolute;top:50px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--dark4);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;box-shadow:0 4px 12px rgba(0,0,0,.3);white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--primary)}

    /* ===== RESPONSIVE: Direct mobile ===== */
    @media(max-width:420px){
      body{background:var(--dark)}
      .phone-wrapper{gap:0}
      .phone-label,.phone-sub{display:none}
      .phone-frame{width:100vw;height:100vh;border-radius:0;border:none;box-shadow:none}
      .phone-notch,.phone-home{display:none}
    }
  </style>
</head>
<body>

<div class="phone-wrapper">
  <div class="phone-label">Zhingkham</div>
  <div class="phone-sub">🇧🇹 The Best Short Video App</div>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-home"></div>
    <div class="phone-inner">
      <div class="toast" id="toast"></div>

      <!-- HOME -->
      <div id="screen-home" class="screen active">
        <div class="top-header">
          <span id="hdr-following">Following</span>
          <div class="hdr-div"></div>
          <span id="hdr-foryou" class="active">For You</span>
        </div>
        <div class="feed" id="feed"></div>
        <div class="modal-overlay hidden" id="comments-modal">
          <div class="comments-modal">
            <div class="comments-header">
              <h3 id="comments-title">Comments</h3>
              <button onclick="closeComments()"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div class="comments-list" id="comments-list"></div>
            <div class="comment-input-row">
              <img src="https://i.pravatar.cc/150?img=10" alt="">
              <input type="text" placeholder="Add a comment..." id="comment-input">
              <button onclick="postComment()">Post</button>
            </div>
          </div>
        </div>
      </div>

      <!-- DISCOVER -->
      <div id="screen-discover" class="screen">
        <div class="discover">
          <div class="discover-title">Discover</div>
          <div class="search-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" placeholder="Search Zhingkham" id="search-input" oninput="handleSearch()">
          </div>
          <div class="cats" id="cats"></div>
          <div class="sec-title">Trending</div>
          <div class="grid" id="discover-grid"></div>
        </div>
      </div>

      <!-- CREATE -->
      <div id="screen-create" class="screen">
        <div class="create-inner">
          <div class="create-hdr">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" onclick="switchTab('home')"><path d="M18 6L6 18M6 6l12 12"/></svg>
            <span class="title">Create</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
          <div class="camera-area">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <span class="cam-text">Camera Preview</span>
            <span class="cam-sub">Tap record to start</span>
          </div>
          <div class="create-controls">
            <div class="duration-row"><span>15s</span><span class="active">60s</span><span>3m</span></div>
            <button class="record-btn" onclick="toast('Recording started!','success')"><div class="record-btn-inner"></div></button>
            <div class="mode-row"><span>Photo</span><span class="active">Video</span><span>Live</span></div>
          </div>
        </div>
      </div>

      <!-- INBOX -->
      <div id="screen-inbox" class="screen">
        <div class="inbox">
          <div class="inbox-hdr"><h2>Inbox</h2></div>
          <div class="inbox-tabs">
            <button class="inbox-tab active">All Activity</button>
            <button class="inbox-tab">Mentions</button>
          </div>
          <div class="notif-list" id="notif-list"></div>
        </div>
      </div>

      <!-- PROFILE -->
      <div id="screen-profile" class="screen">
        <div class="profile">
          <div class="prof-hdr">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg>
            <span class="uname">@zhingkham_user</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </div>
          <div class="prof-section">
            <img class="prof-avatar" src="https://i.pravatar.cc/150?img=10" alt="">
            <div class="prof-name">Zhingkham User</div>
            <div class="stats-row">
              <div class="stat-item"><div class="num">356</div><div class="label">Following</div></div>
              <div class="stat-div"></div>
              <div class="stat-item"><div class="num">1.2K</div><div class="label">Followers</div></div>
              <div class="stat-div"></div>
              <div class="stat-item"><div class="num">8.9K</div><div class="label">Likes</div></div>
            </div>
            <div class="prof-actions">
              <button class="edit-btn" onclick="toast('Edit profile coming soon!')">Edit Profile</button>
              <button class="icon-sq"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></button>
              <button class="icon-sq"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg></button>
            </div>
            <div class="prof-bio">Welcome to Zhingkham! 🇧🇹 Sharing the best of Bhutan ❤️</div>
          </div>
          <div class="prof-tabs">
            <button class="prof-tab active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg></button>
            <button class="prof-tab"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>
          </div>
          <div class="grid" id="profile-grid"></div>
        </div>
      </div>

      <!-- TAB BAR -->
      <div class="tab-bar">
        <button class="tab-item active" onclick="switchTab('home')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span>Home</span>
        </button>
        <button class="tab-item" onclick="switchTab('discover')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><span>Discover</span>
        </button>
        <button class="tab-item" onclick="switchTab('create')">
          <div class="create-tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></div>
        </button>
        <button class="tab-item" onclick="switchTab('inbox')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Inbox</span>
        </button>
        <button class="tab-item" onclick="switchTab('profile')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Me</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const VIDEOS = [
  { id:'1', src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4', user:{username:'dorji_wangmo',avatar:'https://i.pravatar.cc/150?img=1',verified:true}, caption:"Beautiful sunrise over Tiger's Nest 🏔️ #bhutan #travel", song:'Original Sound - dorji_wangmo', likes:45200, comments:[], shares:890, bookmarks:2100 },
  { id:'2', src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4', user:{username:'pema_tshering',avatar:'https://i.pravatar.cc/150?img=2',verified:false}, caption:'Making ema datshi 🍲 #food #bhutan', song:'Bhutanese Folk', likes:23100, comments:[], shares:320, bookmarks:890 },
  { id:'3', src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4', user:{username:'karma_dancer',avatar:'https://i.pravatar.cc/150?img=3',verified:true}, caption:'Cham dance for Tshechu 💃 #dance #culture', song:'Festival Drums', likes:67800, comments:[], shares:1200, bookmarks:4500 },
  { id:'4', src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4', user:{username:'thinley_adventures',avatar:'https://i.pravatar.cc/150?img=4',verified:false}, caption:'Snowman Trek day 15! 🏔️❄️ #hiking', song:'Mountain Vibes', likes:89400, comments:[], shares:5600, bookmarks:12000 },
  { id:'5', src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4', user:{username:'sonam_arts',avatar:'https://i.pravatar.cc/150?img=5',verified:true}, caption:'Painting thangka art 🎨 #art #bhutan', song:'Lo-fi Meditation', likes:34500, comments:[], shares:670, bookmarks:3400 },
];

// Pre-seed some comments
VIDEOS[0].comments = [{user:'pema_tshering',avatar:'https://i.pravatar.cc/150?img=2',text:'So beautiful! 😍',time:'2h'},{user:'karma_dancer',avatar:'https://i.pravatar.cc/150?img=3',text:'I need to visit! 🏔️',time:'4h'},{user:'sonam_arts',avatar:'https://i.pravatar.cc/150?img=5',text:'The colors are incredible',time:'6h'}];
VIDEOS[2].comments = [{user:'dorji_wangmo',avatar:'https://i.pravatar.cc/150?img=1',text:'Your dance is amazing! 🔥',time:'1h'},{user:'thinley_adventures',avatar:'https://i.pravatar.cc/150?img=4',text:'Teach me please! 💃',time:'3h'}];
VIDEOS[3].comments = [{user:'sonam_arts',avatar:'https://i.pravatar.cc/150?img=5',text:'Stay safe out there! ❤️',time:'5h'}];

const CATEGORIES = [
  {label:'🔥 Trending',color:'#FF2D55'},{label:'💃 Dance',color:'#5856D6'},{label:'🍲 Food',color:'#FF9500'},
  {label:'🏛️ Culture',color:'#34C759'},{label:'✈️ Travel',color:'#007AFF'},{label:'🎵 Music',color:'#AF52DE'},
  {label:'😂 Comedy',color:'#FFD60A'},{label:'⚽ Sports',color:'#30D158'},
];

const NOTIFS = [
  {user:'dorji_wangmo',avatar:'https://i.pravatar.cc/150?img=1',text:'liked your video',time:'2h ago',color:'#FF2D55'},
  {user:'pema_tshering',avatar:'https://i.pravatar.cc/150?img=2',text:'started following you',time:'3h ago',color:'#5856D6'},
  {user:'karma_dancer',avatar:'https://i.pravatar.cc/150?img=3',text:'commented: "Amazing! 🔥"',time:'5h ago',color:'#FF9500'},
  {user:'thinley_adventures',avatar:'https://i.pravatar.cc/150?img=4',text:'and 42 others liked your video',time:'8h ago',color:'#FF2D55'},
  {user:'sonam_arts',avatar:'https://i.pravatar.cc/150?img=5',text:'mentioned you in a comment',time:'1d ago',color:'#34C759'},
  {user:'dorji_wangmo',avatar:'https://i.pravatar.cc/150?img=1',text:'shared your video',time:'1d ago',color:'#007AFF'},
  {user:'karma_dancer',avatar:'https://i.pravatar.cc/150?img=3',text:'liked your comment',time:'2d ago',color:'#FF2D55'},
];

const likedSet = new Set();
const bookmarkedSet = new Set();
let currentVideoId = null;

function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n}

function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(()=>t.className='toast',2500)}

// ===== BUILD FEED =====
const feed=document.getElementById('feed');
VIDEOS.forEach((v,i)=>{
  const s=document.createElement('div');
  s.className='video-slide';
  s.dataset.id=v.id;
  const liked=likedSet.has(v.id);
  const saved=bookmarkedSet.has(v.id);
  s.innerHTML=`
    <video src="${v.src}" loop muted playsinline preload="${i<2?'auto':'metadata'}"></video>
    <div class="pause-overlay hidden"><svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21"/></svg></div>
    <div class="heart-pop">❤️</div>
    <div class="vid-actions">
      <div class="vid-avatar"><img src="${v.user.avatar}" alt=""><div class="follow-badge">+</div></div>
      <button class="action-btn" data-action="like" onclick="toggleLike('${v.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        <span class="cnt">${fmt(v.likes)}</span>
      </button>
      <button class="action-btn" onclick="openComments('${v.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span class="cnt">${v.comments.length}</span>
      </button>
      <button class="action-btn" data-action="bookmark" onclick="toggleBookmark('${v.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span class="cnt">${fmt(v.bookmarks)}</span>
      </button>
      <button class="action-btn" onclick="shareVideo('${v.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        <span class="cnt">${fmt(v.shares)}</span>
      </button>
      <div class="music-disc"><img src="${v.user.avatar}" alt=""></div>
    </div>
    <div class="vid-info">
      <div class="uname">@${v.user.username} ${v.user.verified?'<span class="vbadge">✓</span>':''}</div>
      <div class="desc">${v.caption}</div>
      <div class="song">♫ ${v.song}</div>
    </div>`;

  const video=s.querySelector('video');
  const pauseEl=s.querySelector('.pause-overlay');
  let lastTap=0;

  s.addEventListener('click',(e)=>{
    if(e.target.closest('.vid-actions')||e.target.closest('.vid-avatar'))return;
    const now=Date.now();
    if(now-lastTap<300){
      const heart=s.querySelector('.heart-pop');heart.classList.remove('pop');void heart.offsetWidth;heart.classList.add('pop');
      if(!likedSet.has(v.id))toggleLike(v.id);
    }else{
      setTimeout(()=>{if(Date.now()-lastTap>=300){if(video.paused){video.play();pauseEl.classList.add('hidden')}else{video.pause();pauseEl.classList.remove('hidden')}}},300);
    }
    lastTap=now;
  });
  feed.appendChild(s);
});

// Auto-play
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    const v=e.target.querySelector('video');
    if(e.isIntersecting){v.play().catch(()=>{});e.target.querySelector('.pause-overlay')?.classList.add('hidden')}
    else v.pause();
  });
},{threshold:.6});
document.querySelectorAll('.video-slide').forEach(s=>obs.observe(s));

// ===== LIKES =====
function toggleLike(id){
  const slide=document.querySelector(`.video-slide[data-id="${id}"]`);
  const btn=slide.querySelector('[data-action="like"]');
  const v=VIDEOS.find(x=>x.id===id);
  if(likedSet.has(id)){
    likedSet.delete(id);btn.classList.remove('liked');
    btn.querySelector('svg').setAttribute('fill','none');btn.querySelector('svg').setAttribute('stroke','white');
    btn.querySelector('.cnt').textContent=fmt(v.likes);
  }else{
    likedSet.add(id);btn.classList.add('liked');
    btn.querySelector('svg').setAttribute('fill','var(--primary)');btn.querySelector('svg').setAttribute('stroke','var(--primary)');
    btn.querySelector('.cnt').textContent=fmt(v.likes+1);
  }
}

// ===== BOOKMARKS =====
function toggleBookmark(id){
  const slide=document.querySelector(`.video-slide[data-id="${id}"]`);
  const btn=slide.querySelector('[data-action="bookmark"]');
  const v=VIDEOS.find(x=>x.id===id);
  if(bookmarkedSet.has(id)){
    bookmarkedSet.delete(id);btn.classList.remove('bookmarked');
    btn.querySelector('svg').setAttribute('fill','none');btn.querySelector('svg').setAttribute('stroke','white');
    toast('Removed from bookmarks');
  }else{
    bookmarkedSet.add(id);btn.classList.add('bookmarked');
    btn.querySelector('svg').setAttribute('fill','var(--accent)');btn.querySelector('svg').setAttribute('stroke','var(--accent)');
    toast('Saved to bookmarks','success');
  }
}

// ===== SHARE =====
function shareVideo(id){
  if(navigator.share){navigator.share({title:'Check this on Zhingkham!',url:location.href+'#v='+id}).catch(()=>{})}
  else{navigator.clipboard?.writeText(location.href+'#v='+id);toast('Link copied!','success')}
}

// ===== COMMENTS =====
function openComments(id){
  currentVideoId=id;
  const v=VIDEOS.find(x=>x.id===id);
  document.getElementById('comments-modal').classList.remove('hidden');
  document.getElementById('comments-title').textContent=v.comments.length+' Comments';
  const list=document.getElementById('comments-list');
  if(v.comments.length===0){list.innerHTML='<div style="text-align:center;padding:30px;color:var(--gray);font-size:13px">No comments yet. Be the first! 💬</div>';return}
  list.innerHTML=v.comments.map(c=>`<div class="comment-item"><img src="${c.avatar}"><div class="cbody"><div class="cuser">@${c.user}</div><div class="ctext">${c.text}</div><div class="ctime">${c.time}</div></div></div>`).join('');
}

function postComment(){
  if(!currentVideoId)return;
  const input=document.getElementById('comment-input');
  const text=input.value.trim();if(!text)return;input.value='';
  const v=VIDEOS.find(x=>x.id===currentVideoId);
  v.comments.unshift({user:'zhingkham_user',avatar:'https://i.pravatar.cc/150?img=10',text,time:'now'});
  openComments(currentVideoId);
  // Update comment count on slide
  const slide=document.querySelector(`.video-slide[data-id="${currentVideoId}"]`);
  if(slide)slide.querySelectorAll('.action-btn')[1].querySelector('.cnt').textContent=v.comments.length;
  toast('Comment posted!','success');
}

function closeComments(){document.getElementById('comments-modal').classList.add('hidden');currentVideoId=null}

// ===== DISCOVER =====
document.getElementById('cats').innerHTML=CATEGORIES.map(c=>
  `<div class="cat-chip" style="background:${c.color}22;color:${c.color}" onclick="searchCat('${c.label.split(' ')[1]}')">${c.label}</div>`
).join('');

function buildGrid(containerId,videos){
  document.getElementById(containerId).innerHTML=videos.map(v=>
    `<div class="grid-tile" onclick="goToVideo('${v.id}')"><video src="${v.src}" preload="metadata" muted></video><div class="g-overlay">▶ ${fmt(v.likes)}</div></div>`
  ).join('');
}
buildGrid('discover-grid',[...VIDEOS,...VIDEOS]);
buildGrid('profile-grid',VIDEOS);

function searchCat(term){document.getElementById('search-input').value=term;handleSearch()}
function handleSearch(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  if(!q){buildGrid('discover-grid',[...VIDEOS,...VIDEOS]);return}
  const f=VIDEOS.filter(v=>v.caption.toLowerCase().includes(q)||v.user.username.includes(q)||v.song.toLowerCase().includes(q));
  buildGrid('discover-grid',f.length?f:[]);
  if(!f.length)document.getElementById('discover-grid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--gray);font-size:13px">No results for "'+q+'"</div>';
}

function goToVideo(id){switchTab('home');const s=document.querySelector(`.video-slide[data-id="${id}"]`);if(s)s.scrollIntoView({behavior:'smooth'})}

// ===== INBOX =====
document.getElementById('notif-list').innerHTML=NOTIFS.map(n=>
  `<div class="notif-item"><img src="${n.avatar}"><div class="n-body"><div class="n-text"><strong>${n.user}</strong> ${n.text}</div><div class="n-time">${n.time}</div></div><svg width="16" height="16" viewBox="0 0 24 24" fill="${n.color}"><circle cx="12" cy="12" r="5"/></svg></div>`
).join('');

// ===== TAB NAVIGATION =====
function switchTab(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const idx={home:0,discover:1,create:2,inbox:3,profile:4}[name];
  document.querySelectorAll('.tab-item')[idx]?.classList.add('active');
  if(name!=='home')document.querySelectorAll('.video-slide video').forEach(v=>v.pause());
}
</script>
</body>
</html>
