<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zhingkham — Land of Paradise</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --saffron:#E8A838;--vermillion:#D4442A;--jade:#2D8B6F;--lapis:#2E4A7A;
      --gold:#C9A84C;--snow:#F7F5F0;--ink:#1A1714;--parchment:#F0E8D8;
      --mist:rgba(26,23,20,.7);--glow:rgba(232,168,56,.15);
      --radius:16px;--radius-lg:24px;--radius-xl:32px;
    }
    body{font-family:'DM Sans',sans-serif;background:#0D0B09;color:var(--snow);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}

    /* PHONE FRAME */
    .phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:24px}
    .phone-brand{display:flex;align-items:center;gap:12px}
    .phone-brand .logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--saffron),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .phone-brand .tag{font-size:13px;color:var(--gold);opacity:.6;letter-spacing:2px;text-transform:uppercase}
    .phone-frame{width:375px;height:812px;border-radius:50px;border:5px solid #2A2520;overflow:hidden;position:relative;background:var(--ink);box-shadow:0 0 0 1px rgba(201,168,76,.15),0 30px 80px rgba(0,0,0,.7),0 0 120px rgba(232,168,56,.06);transition:all .5s}
    .phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:32px;background:#2A2520;border-radius:0 0 18px 18px;z-index:999}
    .phone-notch::after{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:50px;height:6px;background:#1A1714;border-radius:3px}
    .phone-home{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:130px;height:4px;background:var(--snow);border-radius:2px;z-index:999;opacity:.2}
    .phone-inner{width:100%;height:100%;overflow:hidden;position:relative;display:flex;flex-direction:column}

    .screen{display:none;flex:1;overflow:hidden;position:relative;flex-direction:column}
    .screen.active{display:flex}
    .hidden{display:none!important}

    /* AMBIENT BORDER GLOW */
    .ambient-glow{position:absolute;inset:0;pointer-events:none;z-index:800;opacity:0;transition:opacity .5s}
    .ambient-glow.saffron{box-shadow:inset 0 0 80px rgba(232,168,56,.25);opacity:1}
    .ambient-glow.jade{box-shadow:inset 0 0 80px rgba(45,139,111,.25);opacity:1}
    .ambient-glow.vermillion{box-shadow:inset 0 0 80px rgba(212,68,42,.25);opacity:1}
    .ambient-glow.lapis{box-shadow:inset 0 0 80px rgba(46,74,122,.25);opacity:1}

    /* NAV BAR — Floating Pill at bottom */
    .nav-pill{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);height:56px;display:flex;align-items:center;gap:2px;padding:4px;background:rgba(26,23,20,.85);backdrop-filter:blur(24px) saturate(180%);border-radius:28px;border:1px solid rgba(201,168,76,.12);z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .nav-item{width:52px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:24px;border:none;background:none;color:rgba(247,245,240,.4);cursor:pointer;transition:all .3s;position:relative}
    .nav-item svg{width:22px;height:22px;transition:all .3s}
    .nav-item span{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;opacity:0;transition:all .3s;position:absolute;bottom:3px}
    .nav-item.active{color:var(--saffron);background:rgba(232,168,56,.1)}
    .nav-item.active span{opacity:1}
    .nav-item.active svg{transform:scale(1.1)}
    .create-orb{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--saffron),var(--vermillion));display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(232,168,56,.4);transition:all .2s}
    .create-orb:active{transform:scale(.9)}
    .create-orb svg{width:20px;height:20px;color:white}

    /* HOME — The Scroll */
    .scroll-header{position:absolute;top:40px;left:0;right:0;z-index:20;display:flex;justify-content:center;padding:0 20px}
    .scroll-tabs{display:flex;background:rgba(26,23,20,.6);backdrop-filter:blur(16px);border-radius:20px;padding:3px;border:1px solid rgba(201,168,76,.1)}
    .scroll-tab{padding:6px 18px;border-radius:17px;font-size:13px;font-weight:600;color:rgba(247,245,240,.5);cursor:pointer;transition:all .3s;border:none;background:none}
    .scroll-tab.active{background:var(--saffron);color:var(--ink)}

    /* Stories — Scroll Rings */
    .tale-bar{display:flex;gap:12px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;position:absolute;top:80px;left:0;right:0;z-index:15}
    .tale-bar::-webkit-scrollbar{display:none}
    .tale-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer}
    .tale-ring{width:54px;height:54px;border-radius:50%;padding:3px;background:conic-gradient(var(--saffron),var(--vermillion),var(--jade),var(--lapis),var(--saffron));position:relative}
    .tale-ring img{width:100%;height:100%;border-radius:50%;border:2px solid var(--ink);object-fit:cover}
    .tale-ring.seen{background:rgba(247,245,240,.15)}
    .tale-name{font-size:9px;color:rgba(247,245,240,.6);max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
    .tale-add{position:relative}
    .tale-add::after{content:'+';position:absolute;bottom:0;right:0;width:16px;height:16px;background:var(--saffron);color:var(--ink);border-radius:50%;border:2px solid var(--ink);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}

    /* Tale Viewer */
    .tale-viewer{position:absolute;inset:0;z-index:900;background:var(--ink);display:flex;flex-direction:column}
    .tale-progress{display:flex;gap:3px;padding:8px 10px;position:absolute;top:36px;left:0;right:0;z-index:10}
    .tale-progress .seg{flex:1;height:2.5px;background:rgba(247,245,240,.2);border-radius:2px;overflow:hidden}
    .tale-progress .seg .fill{height:100%;background:var(--saffron);width:0%;border-radius:2px;transition:width .05s linear}
    .tale-user{position:absolute;top:50px;left:12px;z-index:10;display:flex;align-items:center;gap:8px}
    .tale-user img{width:32px;height:32px;border-radius:50%;border:2px solid var(--saffron)}
    .tale-user span{font-size:13px;font-weight:600}
    .tale-close{position:absolute;top:50px;right:12px;z-index:10;background:none;border:none;color:var(--snow);cursor:pointer}
    .tale-close svg{width:24px;height:24px}
    .tale-content{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;text-align:center}
    .tale-text{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1.4}
    .tale-reply{position:absolute;bottom:20px;left:12px;right:12px;display:flex;gap:8px;align-items:center}
    .tale-reply input{flex:1;background:rgba(247,245,240,.08);border:1px solid rgba(201,168,76,.2);border-radius:24px;padding:10px 16px;color:var(--snow);font-size:13px;outline:none;backdrop-filter:blur(10px)}
    .tale-reply input::placeholder{color:rgba(247,245,240,.3)}
    .tale-reply button{background:none;border:none;font-size:20px;cursor:pointer}

    /* VIDEO SCROLL */
    .feed{flex:1;scroll-snap-type:y mandatory;overflow-y:scroll;scrollbar-width:none;position:relative}
    .feed::-webkit-scrollbar{display:none}
    .video-slide{height:100%;scroll-snap-align:start;position:relative;background:var(--ink);flex-shrink:0;overflow:hidden}
    .video-slide video{width:100%;height:100%;object-fit:cover}

    /* Video Info — Card style at bottom */
    .vid-info{position:absolute;bottom:80px;left:14px;right:70px;z-index:10}
    .vid-info .creator{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .vid-info .creator img{width:32px;height:32px;border-radius:50%;border:2px solid var(--saffron);object-fit:cover}
    .vid-info .creator .name{font-weight:700;font-size:14px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
    .vid-info .creator .badge{width:14px;height:14px;background:var(--saffron);border-radius:50%;font-size:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink);font-weight:800}
    .vid-info .caption{font-size:13px;line-height:19px;margin-bottom:6px;text-shadow:0 1px 4px rgba(0,0,0,.5);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;opacity:.9}
    .vid-info .music-row{display:flex;align-items:center;gap:6px;font-size:11px;opacity:.7;text-shadow:0 1px 3px rgba(0,0,0,.5)}
    .vid-info .music-row .note{animation:bounce .6s ease infinite alternate}
    @keyframes bounce{to{transform:translateY(-2px)}}

    /* Side Actions — Vertical "Totem" */
    .action-totem{position:absolute;right:10px;bottom:90px;display:flex;flex-direction:column;align-items:center;gap:16px;z-index:10}
    .totem-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--snow);cursor:pointer;transition:transform .2s}
    .totem-btn:active{transform:scale(.85)}
    .totem-btn svg{width:26px;height:26px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));transition:all .25s}
    .totem-btn .cnt{font-size:10px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.5);opacity:.9}
    .totem-btn.liked svg{fill:var(--vermillion);stroke:var(--vermillion)}
    .totem-btn.saved svg{fill:var(--saffron);stroke:var(--saffron)}

    /* Music Disc — Prayer Wheel style */
    .prayer-wheel{width:40px;height:40px;border-radius:50%;overflow:hidden;animation:spin 6s linear infinite;border:2px solid rgba(201,168,76,.3)}
    .prayer-wheel img{width:100%;height:100%;object-fit:cover}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Mandala Particles on Double-Tap */
    .mandala-particle{position:absolute;pointer-events:none;z-index:60;opacity:0}
    .mandala-particle.fly{animation:mandalaFly 1.2s ease-out forwards}
    @keyframes mandalaFly{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}40%{opacity:1}100%{opacity:0;transform:translateY(-140px) rotate(var(--rot)) scale(.3)}}

    .heart-pop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:50;opacity:0}
    .heart-pop.pop{animation:heartPop .9s ease forwards}
    .heart-pop svg{width:80px;height:80px;fill:var(--vermillion)}
    @keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}25%{transform:translate(-50%,-50%) scale(1.3);opacity:1}50%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

    .pause-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.1);z-index:5}
    .pause-icon svg{width:56px;height:56px;opacity:.6;fill:var(--snow)}

    /* Speed Control */
    .speed-pill{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,23,20,.8);padding:8px 24px;border-radius:24px;font-size:16px;font-weight:700;z-index:30;opacity:0;transition:opacity .2s;backdrop-filter:blur(16px);border:1px solid rgba(201,168,76,.2);font-family:'Playfair Display',serif;letter-spacing:1px}
    .speed-pill.show{opacity:1}

    /* Captions */
    .caption-box{position:absolute;bottom:180px;left:14px;right:70px;z-index:15;pointer-events:none}
    .caption-line{background:rgba(26,23,20,.65);color:var(--snow);padding:5px 12px;border-radius:10px;font-size:12px;line-height:1.5;display:inline-block;margin-bottom:4px;backdrop-filter:blur(8px);opacity:0;transform:translateY(6px);animation:capIn .4s ease forwards;border:1px solid rgba(201,168,76,.08)}
    .caption-line.dz{font-size:13px;border-color:rgba(201,168,76,.15)}
    @keyframes capIn{to{opacity:1;transform:translateY(0)}}
    .cap-toggle{position:absolute;left:14px;bottom:180px;z-index:20;background:rgba(26,23,20,.6);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:4px 10px;color:var(--saffron);font-size:10px;font-weight:700;cursor:pointer;backdrop-filter:blur(10px);letter-spacing:.5px}

    /* Sticker Tray */
    .sticker-tray{position:absolute;bottom:170px;right:8px;background:rgba(26,23,20,.85);border-radius:var(--radius);padding:10px;display:flex;flex-direction:column;gap:8px;z-index:25;backdrop-filter:blur(16px);transform:scale(0);transform-origin:bottom right;transition:transform .25s cubic-bezier(.34,1.56,.64,1);border:1px solid rgba(201,168,76,.1)}
    .sticker-tray.open{transform:scale(1)}
    .sticker-tray span{font-size:24px;cursor:pointer;transition:transform .15s;padding:2px}
    .sticker-tray span:active{transform:scale(1.4)}
    .flying-sticker{position:absolute;font-size:30px;pointer-events:none;z-index:55;opacity:0}
    .flying-sticker.fly{animation:stickerUp 2.5s ease-out forwards}
    @keyframes stickerUp{0%{opacity:1;transform:translateX(0) translateY(0) scale(1)}30%{opacity:1;transform:translateX(var(--dx1)) translateY(-100px) scale(1.2)}100%{opacity:0;transform:translateX(var(--dx2)) translateY(-280px) scale(.4) rotate(var(--rot))}}

    /* Karma */
    .karma-fly{position:absolute;pointer-events:none;z-index:60;font-size:13px;font-weight:700;color:var(--saffron);opacity:0;font-family:'Playfair Display',serif}
    .karma-fly.up{animation:karmaUp .9s ease-out forwards}
    @keyframes karmaUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-45px) scale(.8)}}

    /* Comments — Drawer */
    .modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
    .comments-drawer{background:var(--ink);border-radius:var(--radius-xl) var(--radius-xl) 0 0;width:100%;max-height:55%;display:flex;flex-direction:column;border-top:1px solid rgba(201,168,76,.1)}
    .comments-top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(247,245,240,.06)}
    .comments-top h3{font-family:'Playfair Display',serif;font-size:15px;font-weight:700}
    .comments-top button{background:none;border:none;color:var(--snow);cursor:pointer}
    .comments-top button svg{width:20px;height:20px}
    .comments-scroll{flex:1;overflow-y:auto;padding:12px 16px}
    .c-item{display:flex;gap:10px;margin-bottom:16px;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .c-item img{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .c-item .c-body{flex:1}
    .c-item .c-body .c-user{font-size:11px;font-weight:700;color:var(--saffron);margin-bottom:2px}
    .c-item .c-body .c-text{font-size:12px;line-height:17px;opacity:.85}
    .c-item .c-body .c-time{font-size:10px;color:rgba(247,245,240,.3);margin-top:3px}
    .c-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid rgba(247,245,240,.06);align-items:center}
    .c-input-row img{width:28px;height:28px;border-radius:50%;object-fit:cover}
    .c-input-row input{flex:1;background:rgba(247,245,240,.06);border:1px solid rgba(201,168,76,.1);border-radius:20px;padding:9px 14px;color:var(--snow);font-size:13px;outline:none}
    .c-input-row input::placeholder{color:rgba(247,245,240,.25)}
    .c-input-row button{color:var(--saffron);font-weight:700;font-size:13px;padding:6px;background:none;border:none;cursor:pointer}

    /* DISCOVER — "Explore the Kingdom" */
    .explore{flex:1;overflow-y:auto;padding-top:44px}
    .explore-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;padding:10px 16px 4px}
    .search-wrap{display:flex;align-items:center;gap:8px;background:rgba(247,245,240,.06);border:1px solid rgba(201,168,76,.08);border-radius:14px;margin:8px 14px;padding:0 12px;height:40px}
    .search-wrap svg{width:18px;height:18px;color:rgba(247,245,240,.3);flex-shrink:0}
    .search-wrap input{flex:1;background:none;border:none;color:var(--snow);font-size:14px;outline:none}
    .search-wrap input::placeholder{color:rgba(247,245,240,.25)}
    .realm-bar{display:flex;gap:8px;padding:6px 14px 12px;overflow-x:auto;scrollbar-width:none}
    .realm-bar::-webkit-scrollbar{display:none}
    .realm-chip{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s;border:1px solid transparent}
    .realm-chip:active{transform:scale(.95)}
    .sec-label{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin:6px 14px 10px;display:flex;align-items:center;gap:6px}
    .sec-label .dot{width:6px;height:6px;border-radius:50%;background:var(--saffron)}
    .mosaic{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 2px}
    .mosaic-tile{aspect-ratio:3/4;background:rgba(247,245,240,.04);position:relative;overflow:hidden;cursor:pointer;border-radius:4px;transition:transform .2s}
    .mosaic-tile:active{transform:scale(.97)}
    .mosaic-tile video,.mosaic-tile img{width:100%;height:100%;object-fit:cover}
    .mosaic-tile .tile-stat{position:absolute;bottom:6px;left:6px;display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.6)}

    /* CREATE — "The Studio" */
    .studio{flex:1;display:flex;flex-direction:column;background:var(--ink);padding-top:44px}
    .studio-top{display:flex;justify-content:space-between;align-items:center;padding:8px 16px}
    .studio-top .title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}
    .studio-top svg{width:24px;height:24px;cursor:pointer;color:var(--snow)}
    .viewfinder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(247,245,240,.03);margin:12px;border-radius:var(--radius-lg);gap:12px;position:relative;overflow:hidden;border:1px solid rgba(201,168,76,.06)}
    .viewfinder svg{width:48px;height:48px;color:var(--saffron);opacity:.5}
    .viewfinder .vf-text{font-size:15px;font-weight:600;color:rgba(247,245,240,.4)}
    .viewfinder .vf-sub{font-size:12px;color:rgba(247,245,240,.25)}
    .lens-strip{display:flex;gap:8px;overflow-x:auto;padding:8px 14px;scrollbar-width:none}
    .lens-strip::-webkit-scrollbar{display:none}
    .lens-item{width:52px;height:52px;border-radius:14px;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--snow)}
    .lens-item.active{border-color:var(--saffron)}
    .studio-controls{padding:10px 16px 16px;display:flex;flex-direction:column;align-items:center;gap:14px}
    .time-row{display:flex;gap:16px}
    .time-row span{font-size:12px;font-weight:600;color:rgba(247,245,240,.3);cursor:pointer;transition:color .2s}
    .time-row span.active{color:var(--saffron)}
    .rec-btn{width:72px;height:72px;border-radius:50%;border:3px solid var(--saffron);display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;transition:all .3s}
    .rec-btn-core{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--saffron),var(--vermillion));transition:all .3s}
    .rec-btn.recording .rec-btn-core{border-radius:10px;width:28px;height:28px}
    .mode-strip{display:flex;gap:20px}
    .mode-strip span{font-size:13px;font-weight:600;color:rgba(247,245,240,.3);cursor:pointer;transition:color .2s}
    .mode-strip span.active{color:var(--snow)}

    /* INBOX — "Messages from the Kingdom" */
    .kingdom-inbox{flex:1;overflow-y:auto;padding-top:44px}
    .inbox-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;padding:10px 16px}
    .inbox-filter{display:flex;gap:8px;padding:4px 16px 12px}
    .inbox-chip{padding:6px 16px;border-radius:20px;background:rgba(247,245,240,.06);font-size:12px;font-weight:600;color:rgba(247,245,240,.4);border:1px solid transparent;cursor:pointer;transition:all .2s}
    .inbox-chip.active{background:rgba(232,168,56,.12);color:var(--saffron);border-color:rgba(232,168,56,.3)}
    .notif-stream{padding:0 16px}
    .notif-card{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(247,245,240,.04);cursor:pointer;transition:background .2s;animation:fadeUp .3s ease}
    .notif-card:active{background:rgba(247,245,240,.02)}
    .notif-card img{width:40px;height:40px;border-radius:50%;object-fit:cover}
    .notif-card .n-content{flex:1}
    .notif-card .n-content .n-msg{font-size:13px;line-height:18px}
    .notif-card .n-content .n-msg strong{font-weight:700;color:var(--saffron)}

    /* Mini Player */
    .pip{position:absolute;bottom:82px;right:10px;width:105px;height:170px;border-radius:var(--radius);overflow:hidden;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.15);cursor:pointer;transition:all .2s}

</head>

  {user:'sonam_arts',avatar:'https://i.pravatar.cc/150?img=5',seen:true,slides:[{bg:'linear-gradient(135deg,#D4442A,#E8A838)',text:'New thangka painting WIP 🎨'}]},
];

const MANDALA_CHARS='✦ ❋ ❊ ◈ ◆ ✧ ☸ ༄ ༅ ༆ ❤️ 🙏 🐉 🏔️ ☀ ✿'.split(' ');
const BHUTAN_STICKERS=['🐉','🏔️','🙏','🇧🇹','🎭','🍲','🏹','🎨','💃','🏯'];
const LENSES=[{name:'Natural',bg:'rgba(247,245,240,.03)'},{name:'Warm',bg:'linear-gradient(135deg,rgba(232,168,56,.08),rgba(201,168,76,.05))'},{name:'Cool',bg:'linear-gradient(135deg,rgba(46,74,122,.1),rgba(45,139,111,.05))'},{name:'Vivid',bg:'linear-gradient(135deg,rgba(139,92,168,.08),rgba(212,68,42,.05))'},{name:'Mono',bg:'linear-gradient(135deg,rgba(247,245,240,.06),rgba(26,23,20,.3))'},{name:'Sepia',bg:'linear-gradient(135deg,rgba(201,168,76,.1),rgba(232,168,56,.05))'}];

let likedSet=new Set(),savedSet=new Set(),followedSet=new Set(),currentVideoId=null,karma=0,isRecording=false;
let pipVideoId=null,currentTale=null,taleSlideIdx=0,taleTimer=null;
let captionStates={};

function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast-msg show '+(type||'');setTimeout(()=>t.className='toast-msg',2500)}
function glow(color){const g=document.getElementById('ambient-glow');g.className='ambient-glow '+color;setTimeout(()=>g.className='ambient-glow',500)}
function addKarma(pts,el){
  karma+=pts;document.getElementById('karma-val').textContent=karma+' Karma';
  if(el){
    const rect=el.getBoundingClientRect();
    const phoneRect=document.querySelector('.phone-inner').getBoundingClientRect();
    const f=document.createElement('div');f.className='karma-fly';
    f.textContent='+'+pts+' ✦';
    f.style.left=(rect.left-phoneRect.left+rect.width/2)+'px';
    f.style.top=(rect.top-phoneRect.top)+'px';
    document.querySelector('.phone-inner').appendChild(f);
    requestAnimationFrame(()=>f.classList.add('up'));
    setTimeout(()=>f.remove(),1000);
  }
}

// TALES
const taleBar=document.getElementById('tale-bar');
taleBar.innerHTML=`<div class="tale-item" onclick="toast('Create your tale!')"><div class="tale-ring tale-add"><img src="https://i.pravatar.cc/150?img=10" alt=""></div><div class="tale-name">Your tale</div></div>`+
  TALES.map((s,i)=>`<div class="tale-item" onclick="openTale(${i})"><div class="tale-ring ${s.seen?'seen':''}"><img src="${s.avatar}" alt=""></div><div class="tale-name">${s.user}</div></div>`).join('');

function openTale(idx){
  currentTale=idx;taleSlideIdx=0;
  const s=TALES[idx];s.seen=true;
  document.getElementById('tale-viewer').classList.remove('hidden');
  document.getElementById('tale-user').innerHTML=`<img src="${s.avatar}"><span>@${s.user}</span>`;
  document.getElementById('tale-progress').innerHTML=s.slides.map((_,i)=>`<div class="seg"><div class="fill" id="seg-${i}"></div></div>`).join('');
  showTaleSlide();
}
function showTaleSlide(){
  const s=TALES[currentTale];
  if(taleSlideIdx>=s.slides.length){closeTale();return}
  const slide=s.slides[taleSlideIdx];
  document.getElementById('tale-content').style.background=slide.bg;
  document.getElementById('tale-content').innerHTML=`<div class="tale-text">${slide.text}</div>`;
  for(let i=0;i<s.slides.length;i++){
    const seg=document.getElementById('seg-'+i);
    if(seg)seg.style.width=i<taleSlideIdx?'100%':'0%';
  }
  let progress=0;
  clearInterval(taleTimer);
  taleTimer=setInterval(()=>{
    progress+=2;
    const seg=document.getElementById('seg-'+taleSlideIdx);
    if(seg)seg.style.width=progress+'%';
    if(progress>=100){taleSlideIdx++;showTaleSlide()}
  },100);
  document.getElementById('tale-viewer').onclick=(e)=>{
    if(e.target.closest('.tale-close')||e.target.closest('.tale-reply'))return;
    const rect=document.getElementById('tale-viewer').getBoundingClientRect();
    if(e.clientX>rect.left+rect.width/2){taleSlideIdx++;showTaleSlide()}
    else if(taleSlideIdx>0){taleSlideIdx--;showTaleSlide()}
  };
}
function closeTale(){clearInterval(taleTimer);document.getElementById('tale-viewer').classList.add('hidden');currentTale=null;
  taleBar.querySelectorAll('.tale-item').forEach((el,i)=>{if(i>0&&TALES[i-1].seen)el.querySelector('.tale-ring').classList.add('seen')});
}

// BUILD FEED
const feed=document.getElementById('feed');
VIDEOS.forEach((v,i)=>{
  const s=document.createElement('div');s.className='video-slide';s.dataset.id=v.id;
  s.innerHTML=`
    <video src="${v.src}" loop muted playsinline preload="${i<2?'auto':'metadata'}"></video>
    <div class="pause-icon hidden"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"/></svg></div>
    <div class="heart-pop"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div>
    <div class="speed-pill" id="speed-${v.id}">1.0x</div>
    <div class="caption-box hidden" id="captions-${v.id}"></div>
    <button class="cap-toggle" onclick="toggleCaptions('${v.id}')">Aa</button>
    <div class="sticker-tray" id="stickers-${v.id}">${BHUTAN_STICKERS.map(st=>`<span onclick="launchSticker('${v.id}','${st}')">${st}</span>`).join('')}</div>
    <div class="action-totem">
      <button class="totem-btn" data-action="like" onclick="toggleLike('${v.id}',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        <span class="cnt">${fmt(v.likes)}</span>
      </button>
      <button class="totem-btn" onclick="openComments('${v.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span class="cnt">${v.comments.length}</span>
      </button>
      <button class="totem-btn" data-action="save" onclick="toggleSave('${v.id}',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span class="cnt">${fmt(v.saves)}</span>
      </button>
      <button class="totem-btn" onclick="toggleStickerTray('${v.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        <span class="cnt">${fmt(v.shares)}</span>
      </button>
      <div class="prayer-wheel"><img src="${v.user.avatar}" alt=""></div>
    </div>
    <div class="vid-info">
      <div class="creator">
        <img src="${v.user.avatar}" alt="">
        <span class="name">@${v.user.username}</span>
        ${v.user.verified?'<span class="badge">✓</span>':''}
      </div>
      <div class="caption">${v.caption}</div>
      <div class="music-row"><span class="note">♫</span> ${v.song}</div>
    </div>`;

  const video=s.querySelector('video');
  const pauseEl=s.querySelector('.pause-icon');
  let lastTap=0,longPressTimer=null,isLongPress=false,startX=0;

  s.addEventListener('touchstart',(e)=>{
    if(e.target.closest('.action-totem')||e.target.closest('.cap-toggle')||e.target.closest('.sticker-tray'))return;
    startX=e.touches[0].clientX;isLongPress=false;
    longPressTimer=setTimeout(()=>{isLongPress=true;video.playbackRate=2;showSpeed(v.id,2)},500);
  });
  s.addEventListener('touchmove',(e)=>{
    if(!isLongPress)return;
    const dx=e.touches[0].clientX-startX;
    const rate=Math.max(.25,Math.min(3,1+dx/80));
    video.playbackRate=Math.round(rate*4)/4;
    showSpeed(v.id,video.playbackRate);
  });
  s.addEventListener('touchend',()=>{
    clearTimeout(longPressTimer);
    if(isLongPress){video.playbackRate=1;hideSpeed(v.id);isLongPress=false;return}
  });

  s.addEventListener('click',(e)=>{
    if(e.target.closest('.action-totem')||e.target.closest('.cap-toggle')||e.target.closest('.sticker-tray')||isLongPress)return;
    const now=Date.now();
    if(now-lastTap<300){
      spawnMandala(s,e);
      const heart=s.querySelector('.heart-pop');heart.classList.remove('pop');void heart.offsetWidth;heart.classList.add('pop');
      if(!likedSet.has(v.id))toggleLike(v.id,s.querySelector('[data-action="like"]'));
    }else{
      setTimeout(()=>{if(Date.now()-lastTap>=300){if(video.paused){video.play();pauseEl.classList.add('hidden')}else{video.pause();pauseEl.classList.remove('hidden')}}},300);
    }
    lastTap=now;
  });

  feed.appendChild(s);
});

function showSpeed(id,rate){const el=document.getElementById('speed-'+id);el.textContent=rate.toFixed(2)+'x';el.classList.add('show')}
function hideSpeed(id){document.getElementById('speed-'+id).classList.remove('show')}

function spawnMandala(slide,e){
  const rect=slide.getBoundingClientRect();
  for(let i=0;i<10;i++){
    const p=document.createElement('div');p.className='mandala-particle';
    p.textContent=MANDALA_CHARS[Math.floor(Math.random()*MANDALA_CHARS.length)];
    p.style.left=(e.clientX-rect.left+Math.random()*60-30)+'px';
    p.style.top=(e.clientY-rect.top)+'px';
    p.style.setProperty('--rot',(Math.random()*360-180)+'deg');
    p.style.fontSize=(14+Math.random()*16)+'px';
    slide.appendChild(p);
    requestAnimationFrame(()=>p.classList.add('fly'));
    setTimeout(()=>p.remove(),1300);
  }
}

function toggleCaptions(id){
  const states=['off','en','dz','both'];
  captionStates[id]=(captionStates[id]||0)+1;
  if(captionStates[id]>=states.length)captionStates[id]=0;
  const state=states[captionStates[id]];
  const el=document.getElementById('captions-'+id);
  const v=VIDEOS.find(x=>x.id===id);
  const btn=el.previousElementSibling;
  if(state==='off'){el.classList.add('hidden');btn.textContent='Aa';return}
  el.classList.remove('hidden');
  btn.textContent=state==='en'?'EN':state==='dz'?'དྲ':'EN/དྲ';
  showCaptions(id,state,v.captions);
}
function showCaptions(id,state,captions){
  const el=document.getElementById('captions-'+id);el.innerHTML='';
  captions.forEach((c,i)=>{
    setTimeout(()=>{
      if(state==='en'||state==='both')el.innerHTML+=`<div class="caption-line" style="animation-delay:${i*.1}s">${c.en}</div><br>`;
      if(state==='dz'||state==='both')el.innerHTML+=`<div class="caption-line dz" style="animation-delay:${i*.1}s">${c.dz}</div><br>`;
    },i*1200);
  });
}

function toggleStickerTray(id){
  const el=document.getElementById('stickers-'+id);el.classList.toggle('open');
  setTimeout(()=>el.classList.remove('open'),4000);
}
function launchSticker(id,emoji){
  const slide=document.querySelector(`.video-slide[data-id="${id}"]`);
  const s=document.createElement('div');s.className='flying-sticker';s.textContent=emoji;
  s.style.right=(20+Math.random()*40)+'px';s.style.bottom='150px';
  s.style.setProperty('--dx1',(Math.random()*60-30)+'px');
  s.style.setProperty('--dx2',(Math.random()*80-40)+'px');
  s.style.setProperty('--rot',(Math.random()*360-180)+'deg');
  slide.appendChild(s);requestAnimationFrame(()=>s.classList.add('fly'));
  setTimeout(()=>s.remove(),2600);
  addKarma(2,null);
  document.getElementById('stickers-'+id).classList.remove('open');
}

setInterval(()=>{
  document.querySelectorAll('.video-slide').forEach(sl=>{
    if(Math.random()>.75){
      const emoji=BHUTAN_STICKERS[Math.floor(Math.random()*BHUTAN_STICKERS.length)];
      const s=document.createElement('div');s.className='flying-sticker';s.textContent=emoji;
      s.style.left=(10+Math.random()*60)+'px';s.style.bottom='100px';
      s.style.setProperty('--dx1',(Math.random()*50)+'px');
      s.style.setProperty('--dx2',(Math.random()*70)+'px');
      s.style.setProperty('--rot',(Math.random()*180)+'deg');
      sl.appendChild(s);requestAnimationFrame(()=>s.classList.add('fly'));
      setTimeout(()=>s.remove(),2600);
    }
  });
},6000);

const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{const v=e.target.querySelector('video');if(e.isIntersecting){v.play().catch(()=>{});e.target.querySelector('.pause-icon')?.classList.add('hidden')}else v.pause()})},{threshold:.6});
document.querySelectorAll('.video-slide').forEach(s=>obs.observe(s));

function toggleLike(id,el){
  const slide=document.querySelector(`.video-slide[data-id="${id}"]`);
  const btn=el||slide.querySelector('[data-action="like"]');
  const v=VIDEOS.find(x=>x.id===id);
  if(likedSet.has(id)){
    likedSet.delete(id);btn.classList.remove('liked');
    btn.querySelector('svg').setAttribute('fill','none');btn.querySelector('svg').setAttribute('stroke','white');
    btn.querySelector('.cnt').textContent=fmt(v.likes);
  }else{
    likedSet.add(id);btn.classList.add('liked');
    btn.querySelector('svg').setAttribute('fill','var(--vermillion)');btn.querySelector('svg').setAttribute('stroke','var(--vermillion)');
    btn.querySelector('.cnt').textContent=fmt(v.likes+1);
    glow('vermillion');addKarma(5,btn);
  }
}

function toggleSave(id,el){
  const slide=document.querySelector(`.video-slide[data-id="${id}"]`);
  const btn=el||slide.querySelector('[data-action="save"]');
  if(savedSet.has(id)){
    savedSet.delete(id);btn.classList.remove('saved');
    btn.querySelector('svg').setAttribute('fill','none');btn.querySelector('svg').setAttribute('stroke','white');
    toast('Removed from collection');
  }else{
    savedSet.add(id);btn.classList.add('saved');
    btn.querySelector('svg').setAttribute('fill','var(--saffron)');btn.querySelector('svg').setAttribute('stroke','var(--saffron)');
    toast('Saved to collection','success');glow('saffron');addKarma(3,btn);
  }
}

function openComments(id){
  currentVideoId=id;const v=VIDEOS.find(x=>x.id===id);
  document.getElementById('comments-modal').classList.remove('hidden');
  document.getElementById('comments-title').textContent=v.comments.length+' Comments';
  const list=document.getElementById('comments-list');
  if(!v.comments.length){list.innerHTML='<div style="text-align:center;padding:30px;color:rgba(247,245,240,.25);font-size:13px">No comments yet. Be the first! 🙏</div>';return}
  list.innerHTML=v.comments.map(c=>`<div class="c-item"><img src="${c.avatar}"><div class="c-body"><div class="c-user">@${c.user}</div><div class="c-text">${c.text}</div><div class="c-time">${c.time}</div></div></div>`).join('');
}
function postComment(){
  if(!currentVideoId)return;const input=document.getElementById('comment-input');const text=input.value.trim();if(!text)return;input.value='';
  const v=VIDEOS.find(x=>x.id===currentVideoId);
  v.comments.unshift({user:'zhingkham_user',avatar:'https://i.pravatar.cc/150?img=10',text,time:'now'});
  openComments(currentVideoId);
  const slide=document.querySelector(`.video-slide[data-id="${currentVideoId}"]`);
  if(slide)slide.querySelectorAll('.totem-btn')[1].querySelector('.cnt').textContent=v.comments.length;
  toast('Comment posted!','success');glow('jade');addKarma(5,null);
}
function closeComments(){document.getElementById('comments-modal').classList.add('hidden');currentVideoId=null}

// DISCOVER
document.getElementById('realm-bar').innerHTML=REALMS.map(c=>`<div class="realm-chip" style="background:${c.bg};color:${c.color};border-color:${c.color}33" onclick="searchRealm('${c.label.split(' ')[1]}')">${c.label}</div>`).join('');
function buildMosaic(cid,vids){document.getElementById(cid).innerHTML=vids.map(v=>`<div class="mosaic-tile" onclick="goToVideo('${v.id}')"><video src="${v.src}" preload="metadata" muted></video><div class="tile-stat">▶ ${fmt(v.likes)}</div></div>`).join('')}
buildMosaic('discover-grid',[...VIDEOS,...VIDEOS]);buildMosaic('profile-grid',VIDEOS);
function searchRealm(t){document.getElementById('search-input').value=t;handleSearch()}
function handleSearch(){const q=document.getElementById('search-input').value.toLowerCase().trim();if(!q){buildMosaic('discover-grid',[...VIDEOS,...VIDEOS]);return}const f=VIDEOS.filter(v=>v.caption.toLowerCase().includes(q)||v.user.username.includes(q)||v.song.toLowerCase().includes(q));buildMosaic('discover-grid',f.length?f:[]);if(!f.length)document.getElementById('discover-grid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:rgba(247,245,240,.25);font-size:13px">No results for "'+q+'"</div>'}
function goToVideo(id){switchTab('home');const s=document.querySelector(`.video-slide[data-id="${id}"]`);if(s)s.scrollIntoView({behavior:'smooth'})}

// INBOX
document.getElementById('notif-stream').innerHTML=NOTIFS.map(n=>`<div class="notif-card"><img src="${n.avatar}"><div class="n-content"><div class="n-msg"><strong>${n.user}</strong> ${n.text}</div><div class="n-when">${n.time}</div></div><div class="n-dot" style="background:${n.dot}"></div></div>`).join('');

// CREATE
document.getElementById('lens-strip').innerHTML=LENSES.map((f,i)=>`<div class="lens-item ${i===0?'active':''}" style="background:${f.bg}" onclick="applyLens(this,'${f.bg}')">${f.name}</div>`).join('');
function applyLens(el,bg){document.querySelectorAll('.lens-item').forEach(c=>c.classList.remove('active'));el.classList.add('active');document.getElementById('viewfinder').style.background=bg;toast(el.textContent+' lens applied','success')}
function toggleRecording(){const btn=document.getElementById('rec-btn');isRecording=!isRecording;btn.classList.toggle('recording');toast(isRecording?'Recording started...':'Recording stopped',isRecording?'error':'success')}

// PIP
function showPip(videoId){
  const v=VIDEOS.find(x=>x.id===videoId);if(!v)return;
  pipVideoId=videoId;
  const mp=document.getElementById('pip');
  document.getElementById('pip-video').src=v.src;
  document.getElementById('pip-video').play().catch(()=>{});
  mp.classList.remove('hidden');
}
function closePip(){document.getElementById('pip').classList.add('hidden');document.getElementById('pip-video').pause();pipVideoId=null}
function pipTap(){if(pipVideoId){closePip();switchTab('home');const s=document.querySelector(`.video-slide[data-id="${pipVideoId}"]`);if(s)s.scrollIntoView({behavior:'smooth'})}}

// TAB NAV
let currentTab='home';
function switchTab(name){
  if(currentTab==='home'&&name!=='home'){
    const playingSlide=document.querySelector('.video-slide video:not([paused])');
    if(playingSlide){const id=playingSlide.closest('.video-slide').dataset.id;showPip(id)}
  }
  if(name==='home')closePip();
  currentTab=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const navItems=document.querySelectorAll('.nav-item');
  const idx={home:0,discover:1,inbox:2,profile:3}[name];
  if(idx!==undefined)navItems[idx]?.classList.add('active');
  if(name!=='home')document.querySelectorAll('.video-slide video').forEach(v=>v.pause());
}
</script>
</body>
</html>
